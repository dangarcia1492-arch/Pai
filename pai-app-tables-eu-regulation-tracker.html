<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>EU Regulation Tracker — Topics Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* base typography colors */
    --navy:#0a1729; --link:#014486; --accent:#0176d3;
    --accent-2:#014486; --accent-3:#032e61;
    --accent-soft:#e3effc; --accent-soft-2:#cfe1f6;
    /* greys — cooler than v1 */
    --gray-1:#f6f7f9; --gray-2:#ebeff5; --gray-3:#cfe1f5;
    --border:#dbe1ea; --border-soft:#ebeff5;
    --text-mute:#5e6878; --text-soft:#8a93a3;
    /* status — modern (peach amber, lighter green) */
    --amber:#905200; --amber-bg:#fef0c7; --amber-fg:#905200; --amber-fill:#ca8501;
    --green:#2e844a; --green-bg:#d6f1dc; --green-fg:#2e844a; --green-fill:#2e844a;
    --red:#ba0517;   --red-bg:#feded8;   --red-fg:#a72929;   --red-fill:#ba0517;
    /* page surface + neutral fills */
    --bg:#fcfcfc;
    --gray-bg:#ebeff5; --gray-fg:#5e6878;
    /* typography family aliases */
    --display:'Inter',-apple-system,sans-serif;
    --sans:'Inter',-apple-system,sans-serif;
    /* timing */
    --t-fast:.22s; --t-med:.4s;
    --easing:cubic-bezier(.32,.72,.24,1);
  }
  *{box-sizing:border-box}
  body{font-family:'Inter',-apple-system,sans-serif;color:var(--navy);background:#fff;margin:0;line-height:1.55;font-size:14px;-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv11"}
  .wrap{max-width:1320px;margin:0 auto;padding:48px 40px 96px}

  .crumb{font-family:'Inter',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--text-mute);margin-bottom:14px}
  .crumb a{color:var(--text-mute);text-decoration:none}
  .crumb a:hover{color:var(--accent)}

  .hero{display:grid;grid-template-columns:1fr auto;gap:48px;align-items:end;padding-bottom:32px;margin-bottom:32px}
  .hero-eyebrow{font-family:'Inter',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-soft);margin-bottom:14px}
  .hero-title{font-family:'Source Serif 4',serif;font-size:38px;font-weight:600;letter-spacing:-0.025em;margin:0 0 10px;line-height:1.1}
  .hero-sub{font-size:15px;color:var(--text-mute);margin:0;max-width:640px;line-height:1.6;white-space:pre-line;font-weight:400}
  .hero-stats{display:flex;gap:14px;text-align:right}
  .hero-stat{display:flex;flex-direction:column;gap:2px}
  .hero-stat-num{font-family:'Source Serif 4',serif;font-size:22px;font-weight:600;color:var(--navy);line-height:1;font-variant-numeric:tabular-nums}
  .hero-stat-lbl{font-family:'Inter',sans-serif;font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mute)}

  .tabs{display:flex;gap:0;border-bottom:1px solid var(--gray-2);margin-bottom:20px;overflow-x:auto;position:relative}
  .tab{font-family:'Inter',sans-serif;font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-mute);background:transparent;border:0;padding:12px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:9px;white-space:nowrap;transition:color var(--t-fast)}
  .tab:hover{color:var(--navy)}
  .tab.active{color:var(--link);border-bottom-color:var(--link)}
  .tab .count{font-size:10px;background:var(--gray-2);padding:2px 7px;border-radius:3px;letter-spacing:0;font-weight:600;color:var(--navy)}
  .tab.active .count{background:#e3effc;color:var(--link)}

  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
  .toolbar-l{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .filter-pill{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:0;background:transparent;border:1px solid var(--border-soft);border-radius:999px;padding:6px 13px;color:var(--text-mute);cursor:pointer;transition:all var(--t-fast);display:inline-flex;align-items:center;gap:6px}
  .filter-pill:hover{border-color:var(--gray-3);color:var(--navy);background:var(--gray-1)}
  .filter-pill.active{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:500}
  .toolbar-r{display:flex;gap:14px;align-items:center;font-size:12px;color:var(--text-mute)}
  .legend{display:flex;gap:12px;align-items:center;font-family:'Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--text-mute)}
  .legend-item{display:inline-flex;align-items:center;gap:5px}
  .legend-pip{width:11px;height:11px;border-radius:3px;background:var(--gray-2)}
  .legend-pip.s-verified{background:var(--green-fg)}
  .legend-pip.s-pending{background:var(--amber-fg)}
  .legend-pip.s-source{background:#c8d0dc}

  .tracker-shell{position:relative}

  .matrix{background:#fff;border:1px solid var(--border-soft);border-radius:14px;overflow:auto;max-height:74vh;box-shadow:0 1px 3px rgba(10,23,41,.04)}
  .matrix-row{display:grid;align-items:stretch;border-bottom:1px solid var(--border-soft);transition:background var(--t-fast)}
  .matrix-row:last-child{border-bottom:0}
  .matrix-row.head{background:#fff;position:sticky;top:0;z-index:3;border-bottom:1px solid var(--gray-3)}
  .matrix-row:not(.head):hover{background:var(--gray-1)}

  .col-juris, .col-slot{padding:14px 16px;display:flex;flex-direction:column;gap:3px;justify-content:center}
  .col-juris{border-right:1px solid var(--gray-2);background:#fff;position:sticky;left:0;z-index:2}
  .matrix-row.head .col-juris{background:var(--gray-1)}
  .col-juris .name{font-size:14px;font-weight:600;color:var(--navy)}
  .col-juris .name a{color:inherit;text-decoration:none}
  .col-juris .name a:hover{color:var(--accent)}
  .col-juris .iso{font-family:'Inter',sans-serif;font-size:10px;color:var(--text-mute);letter-spacing:.06em;font-weight:700}

  .col-slot{padding:12px 10px;align-items:center;justify-content:center;cursor:pointer;border-right:1px solid var(--gray-2);min-width:0;transition:background var(--t-fast),transform var(--t-fast);position:relative}
  .col-slot:last-of-type{border-right:0}
  .col-slot:hover{background:#fff;transform:scale(1.04);z-index:1;box-shadow:0 4px 14px rgba(10,23,41,.08)}
  .col-slot.is-active{background:var(--accent);box-shadow:inset 0 0 0 2px var(--accent)}
  .col-slot.is-active .pip{box-shadow:0 0 0 3px rgba(255,255,255,.5)}
  .col-slot.is-active .summary-line{color:#fff}

  .matrix-row.head .col-slot{cursor:default;align-items:stretch;background:var(--gray-1);transform:none;padding:10px 8px;gap:0}
  .matrix-row.head .col-slot:hover{background:var(--gray-1);transform:none;box-shadow:none}
  .matrix-row.head .col-juris{cursor:pointer}
  .matrix-row.head .col-juris.is-sorted .name::after{content:""}
  .col-slot-label{font-family:'Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-mute);text-align:center;line-height:1.35;cursor:pointer;padding:6px 4px;border-radius:4px;transition:background var(--t-fast),color var(--t-fast)}
  .col-slot-label:hover{background:rgba(0,0,0,.04);color:var(--navy)}
  .col-slot-label .sort-ind{display:inline-block;margin-left:4px;font-size:10px;color:var(--text-soft);transition:color var(--t-fast)}
  .col-slot-label.is-sorted{color:var(--accent-2)}
  .col-slot-label.is-sorted .sort-ind{color:var(--accent)}
  .col-slot-controls{display:flex;justify-content:center;gap:2px;margin-top:4px;align-items:center}
  .th-filter{background:transparent;border:1px solid transparent;color:var(--text-soft);cursor:pointer;font-size:11px;padding:2px 7px;border-radius:4px;line-height:1;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:0;transition:all var(--t-fast)}
  .th-filter:hover{background:var(--gray-2);color:var(--navy);border-color:var(--gray-3)}
  .th-filter.has-filter{background:var(--accent-soft);color:var(--accent-2);border-color:var(--accent-soft-2)}
  .th-filter .fcount{display:inline-block;padding:0 4px;background:var(--accent);color:#fff;border-radius:8px;font-size:9px;margin-left:3px;line-height:1.4}
  /* row striping for visual rhythm */
  .matrix-row:not(.head):nth-child(even){background:rgba(10,23,41,.013)}
  .matrix-row:not(.head):nth-child(even):hover{background:var(--gray-1)}
  /* filter popover */
  .th-filter-popover{position:fixed;background:#fff;border:1px solid var(--gray-2);border-radius:9px;box-shadow:0 8px 24px rgba(10,23,41,.15);padding:8px;min-width:220px;z-index:200;font-family:'Inter',sans-serif}
  .fpop-title{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-mute);padding:4px 8px 8px;border-bottom:1px solid var(--gray-2);margin-bottom:4px}
  .fpop-row{display:flex;gap:9px;align-items:center;padding:6px 8px;border-radius:5px;cursor:pointer;font-size:12.5px;color:var(--navy)}
  .fpop-row:hover{background:var(--gray-1)}
  .fpop-row input{cursor:pointer;width:14px;height:14px;accent-color:var(--accent)}
  .fpop-row .fpip{width:10px;height:10px;border-radius:3px;flex-shrink:0}
  .fpop-row .fpip.s-verified{background:var(--green-fg)}
  .fpop-row .fpip.s-pending{background:var(--amber-fg)}
  .fpop-row .fpip.s-source{background:#c8d0dc}
  .fpop-actions{display:flex;gap:6px;padding:6px 4px 2px;border-top:1px solid var(--gray-2);margin-top:4px}
  .fpop-actions button{flex:1;padding:6px;border:1px solid var(--gray-3);background:#fff;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;color:var(--text-mute);font-family:'Inter',sans-serif;transition:all var(--t-fast)}
  .fpop-actions button:hover{border-color:var(--navy);color:var(--navy)}
  .fpop-actions .fpop-apply{background:var(--accent);color:#fff;border-color:var(--accent)}
  .fpop-actions .fpop-apply:hover{background:var(--accent-2);border-color:var(--accent-2);color:#fff}

  .pip{width:14px;height:14px;border-radius:4px;background:var(--gray-2);transition:transform var(--t-fast)}
  .pip.s-verified{background:var(--green-fg)}
  .pip.s-pending{background:var(--amber-fg)}
  .pip.s-source{background:#c8d0dc}

  .summary-line{font-size:11px;color:var(--text-mute);text-align:center;line-height:1.35;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-family:'Inter',sans-serif;letter-spacing:.02em}
  .col-slot:hover .summary-line{color:var(--navy)}

  .detail-panel{background:#fff;border:1px solid var(--gray-2);border-radius:12px;padding:0;display:flex;flex-direction:column;width:420px;max-height:calc(100vh - 48px);overflow:hidden;opacity:0;transform:translateX(20px);pointer-events:none;transition:opacity var(--t-med) var(--easing),transform var(--t-med) var(--easing);position:fixed;top:24px;right:24px;z-index:30;box-shadow:0 18px 48px rgba(10,23,41,.16)}
  .tracker-shell.detail-open .detail-panel{opacity:1;transform:none;pointer-events:auto}
  .detail-head{padding:18px 20px 14px;border-bottom:1px solid var(--gray-2);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .detail-head-l{flex:1}
  .detail-juris{font-family:'Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mute);margin-bottom:5px}
  .detail-juris a{color:inherit;text-decoration:none}
  .detail-juris a:hover{color:var(--accent)}
  .detail-slot{font-family:'Source Serif 4',serif;font-size:18px;font-weight:600;letter-spacing:-0.01em;margin:0;line-height:1.3}
  .detail-close{background:transparent;border:0;cursor:pointer;color:var(--text-soft);font-size:18px;line-height:1;padding:4px 8px;border-radius:5px;transition:background var(--t-fast),color var(--t-fast)}
  .detail-close:hover{background:var(--gray-1);color:var(--navy)}
  .detail-status{padding:14px 20px;border-bottom:1px solid var(--gray-2);background:var(--gray-1);display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--text-mute)}
  .detail-status .pill{font-family:'Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:3px}
  .pill-pending{color:var(--amber-fg);background:var(--amber-bg)}
  .pill-verified{color:var(--green-fg);background:var(--green-bg)}
  .pill-source{color:var(--gray-fg);background:var(--gray-bg)}

  .detail-body{padding:18px 20px;overflow:auto;flex:1}
  .detail-views{display:flex;flex-direction:column;gap:18px}
  .detail-view{padding-bottom:18px;border-bottom:1px dashed var(--gray-2)}
  .detail-view:last-child{border-bottom:0;padding-bottom:0}
  .detail-view-lbl{font-family:'Source Serif 4',serif;font-size:15px;font-weight:600;letter-spacing:-0.005em;text-transform:none;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:10px}
  .detail-view-lbl::before{content:"";width:6px;height:18px;border-radius:2px;background:var(--accent);flex-shrink:0}
  .detail-view-lbl .lbl-tag{font-family:'Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mute);margin-left:4px}
  .detail-view-text{font-size:13px;color:var(--navy);line-height:1.55}
  .detail-view-text.short{font-size:13.5px;font-weight:500}
  .detail-view-text.full{color:var(--text-mute);line-height:1.6}
  .detail-source{margin-top:14px;padding:10px 12px;background:var(--gray-1);border-radius:6px;font-size:11.5px}
  .detail-source-lbl{font-family:'Inter',sans-serif;font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mute);margin-bottom:3px}
  .detail-source a{color:var(--accent);text-decoration:none;font-weight:600;word-break:break-all}
  .detail-source a:hover{text-decoration:underline}

  @media(max-width:1100px){
    .tracker-shell.detail-open{grid-template-columns:1fr;gap:18px}
    .detail-panel{position:static}
  }
  @media(max-width:820px){
    .matrix-row{grid-template-columns:140px repeat(6,minmax(80px,1fr))!important}
    .hero{grid-template-columns:1fr;gap:18px}
    .hero-stats{justify-content:flex-start}
  }
</style>

<body>
<div class="wrap">

  <div class="crumb"><a href="pai-app-tables.html">Topics Hub</a> / Regulation Trackers / EU</div>

  <div class="hero">
    <div>
      <div class="hero-eyebrow">Topics Hub · Comparative tracker</div>
      <h1 class="hero-title">EU Regulation Tracker</h1>
      <p class="hero-sub" id="h-sub"></p>
    </div>
    <div class="hero-stats">
      <div class="hero-stat"><span class="hero-stat-num" id="h-states">—</span><span class="hero-stat-lbl" id="h-states-lbl">States</span></div>
      <div class="hero-stat"><span class="hero-stat-num" id="h-slots">—</span><span class="hero-stat-lbl">Slots tracked</span></div>
      <div class="hero-stat"><span class="hero-stat-num" id="h-cells">—</span><span class="hero-stat-lbl">Total cells</span></div>
    </div>

  <div class="tabs" role="tablist" id="tabs"></div>

  <div class="toolbar">
    <div class="toolbar-l" id="filter-pills"></div>

      <div class="legend">
        <span class="legend-item"><span class="legend-pip s-verified"></span>Verified</span>
        <span class="legend-item"><span class="legend-pip s-pending"></span>Sourced (pending verify)</span>
        <span class="legend-item"><span class="legend-pip s-source"></span>Awaiting source</span>
      </div>
    </div>
  </div>

  <div class="tracker-shell" id="shell">
    <div class="matrix" id="matrix"></div>
    <aside class="detail-panel" id="detail" hidden>
      <div class="detail-head">
        <div class="detail-head-l">
          <div class="detail-juris" id="d-juris"></div>
          <h3 class="detail-slot" id="d-slot"></h3>
        </div>
        <button class="detail-close" id="d-close" aria-label="Close detail">×</button>

      <div class="detail-status">
        <span class="pill" id="d-pill"></span>

      <div class="detail-body">

          </div>
          <div class="detail-view">
            <div class="detail-view-lbl">Short <span class="lbl-tag">Impl status drill-in</span></div>
            <div class="detail-view-text short" id="d-short"></div>
          </div>
          <div class="detail-view">
            <div class="detail-view-lbl">Full note <span class="lbl-tag">This panel · longest version</span></div>
            <div class="detail-view-text full" id="d-full"></div>
          </div>
          <div class="detail-source" id="d-source-wrap">
            <div class="detail-source-lbl">Primary source · AT2 row</div>
            <a href="#" id="d-source"></a>
          </div>
        </div>
      </div>
    </aside>
  </div>

 {"status": "source", "short": "Pending source verification.", "full": "No primary-source document has been captured yet for Sweden's National AI Law. Until a primary source is captured, the cell stays awaiting-source and no claim is published.", "source": null}, "sweden__nis2__transposition": {"status": "source", "short": "Pending source verification.", "full": "No primary-source document has been captured yet for Sweden's Transposition. Until a primary source is captured, the cell stays awaiting-source and no claim is published.", "source": null}, "sweden__nis2__competent_authority": {"status": "verified", "short": "Sweden competent authority: in place.", "full": "Sweden — Competent Authority, status: In Place. [mock data — replace via build_eu_regulation_tracker.py once intake.site_claim has approved rows for the EU 27.]", "source": "https://digital-strategy.ec.europa.eu/en/policies/ai-act-implementation"}, "sweden__nis2__spoc": {"status": "source", "short": "Pending source verification.", "full": "No primary-source document has been captured yet for Sweden's Single Point of Contact. Until a primary source is captured, the cell stays awaiting-source and no claim is published.", "source": null}, "sweden__nis2__csirt": {"status": "source", "short": "Pending source verification.", "full": "No primary-source document has been captured yet for Sweden's CSIRT. Until a primary source is captured, the cell stays awaiting-source and no claim is published.", "source": null}, "sweden__nis2__national_strategy": {"status": "source", "short": "Pending source verification.", "full": "No primary-source document has been captured yet for Sweden's National Cyber Strategy. Until a primary source is captured, the cell stays awaiting-source and no claim is published.", "source": null}, "sweden__gdpr__supervisory_auth": {"status": "verified", "short": "Sweden supervisory authority: in place.", "full": "Sweden — Supervisory Authority, status: In Place. [mock data — replace via build_eu_regulation_tracker.py once intake.site_claim has approved rows for the EU 27.]", "source": "https://digital-strategy.ec.europa.eu/en/policies/ai-act-implementation"}, "sweden__gdpr__lead_auth": {"status": "verified", "short": "Sweden lead supervisory auth.: in place.", "full": "Sweden — Lead Supervisory Auth., status: In Place. [mock data — replace via build_eu_regulation_tracker.py once intake.site_claim has approved rows for the EU 27.]", "source": "https://digital-strategy.ec.europa.eu/en/policies/ai-act-implementation"}, "sweden__gdpr__national_law": {"status": "pending", "short": "Sweden national implementing law: pending verify.", "full": "Sweden — National Implementing Law, status: Pending Verify. [mock data — replace via build_eu_regulation_tracker.py once intake.site_claim has approved rows for the EU 27.]", "source": "https://digital-strategy.ec.europa.eu/en/policies/ai-act-implementation"}, "sweden__gdpr__dpia_list": {"status": "pending", "short": "Sweden dpia mandatory list: pending verify.", "full": "Sweden — DPIA Mandatory List, status: Pending Verify. [mock data — replace via build_eu_regulation_tracker.py once intake.site_claim has approved rows for the EU 27.]", "source": "https://digital-strategy.ec.europa.eu/en/policies/ai-act-implementation"}, "sweden__gdpr__breach_rules": {"status": "pending", "short": "Sweden breach reporting rules: pending verify.", "full": "Sweden — Breach Reporting Rules, status: Pending Verify. [mock data — replace via build_eu_regulation_tracker.py once intake.site_claim has approved rows for the EU 27.]", "source": "https://digital-strategy.ec.europa.eu/en/policies/ai-act-implementation"}}, "meta": {"title": "EU Regulation Tracker", "crumb": "EU", "sub": "Member-state-by-member-state designations under the EU AI Act, NIS2 and GDPR.\nThe same AT2 row powers the icon, the per-state implementation status, and the full notes here. Single source of truth.", "entity_label": "Member state", "entity_label_plural": "Member states", "iso_sub_label": "ISO · alphabetical"}}</script>

<script>
(function(){
  const DATA = JSON.parse(document.getElementById('tracker-data').textContent);
  const states = DATA.states;
  const tabs = DATA.tabs;
  const filters = DATA.filters;
  const cells = DATA.cells || {};
  const meta = DATA.meta || {};

  document.getElementById('h-sub').textContent = meta.sub || '';
  if (meta.entity_label_plural) {
    document.getElementById('h-states-lbl').textContent = meta.entity_label_plural;
  }

  let activeTab = tabs[0].key;
  let activeFilter = filters[0];
  // sortState: {col: 'juris' | <slotKey>, dir: 'asc' | 'desc'}.
  // Default: by jurisdiction name asc.
  let sortState = { col: 'juris', dir: 'asc' };
  // columnFilters: { <slotKey>: ['verified','pending','source'] } — empty array == no filter on that col.
  let columnFilters = {};
  const STATUS_LABELS = { verified: 'Verified', pending: 'Pending verify', source: 'Awaiting source' };
  const STATUS_RANK = { verified: 0, pending: 1, source: 2 };

  const matrix = document.getElementById('matrix');
  const tabsEl = document.getElementById('tabs');
  const filterPills = document.getElementById('filter-pills');
  const shell = document.getElementById('shell');

  // Hero counts
  const totalSlots = tabs.reduce((s,t)=>s+t.slots.length,0);
  document.getElementById('h-states').textContent = states.length;
  document.getElementById('h-slots').textContent = totalSlots;
  document.getElementById('h-cells').textContent = (states.length * totalSlots).toLocaleString();

  // Filter logic — state inclusion by region or status
  const PACIFIC = new Set(['ca','or','wa','ak','hi']);
  const MOUNTAIN = new Set(['az','co','id','mt','nv','nm','ut','wy']);
  const MIDWEST = new Set(['il','in','ia','ks','mi','mn','mo','ne','nd','oh','sd','wi']);
  const SOUTH = new Set(['al','ar','dc','de','fl','ga','ky','la','md','ms','nc','ok','sc','tn','tx','va','wv']);
  const NORTHEAST = new Set(['ct','me','ma','nh','nj','ny','pa','ri','vt']);
  const TERRITORIES = new Set(['pr','gu']);

  function passesFilter(state){
    const f = activeFilter;
    if (f.startsWith('All')) return true;
    if (f === 'Pacific') return PACIFIC.has(state.slug);
    if (f === 'Mountain') return MOUNTAIN.has(state.slug);
    if (f === 'Midwest') return MIDWEST.has(state.slug);
    if (f === 'South') return SOUTH.has(state.slug);
    if (f === 'Northeast') return NORTHEAST.has(state.slug);
    if (f === 'Territories') return TERRITORIES.has(state.slug);
    if (f === 'Privacy law in force' || f === 'Comp. privacy in force'){
      const c = cells[`${state.slug}__privacy__inforce`];
      return c && c.status === 'verified';
    }
    if (f === 'AI law enacted' || f === 'AI law on books'){
      const c = cells[`${state.slug}__ai__discrim`];
      return c && (c.status === 'verified' || c.status === 'pending');
    }
    return true;
  }

  function getCell(slug, tabKey, slotKey){
    const k = `${slug}__${tabKey}__${slotKey}`;
    return cells[k] || {status:'source', short:'Pending source verification.', full:'No primary-source document has been captured yet.', source:null};
  }

  function renderTabs(){
    tabsEl.innerHTML = tabs.map(t =>
      `<button class="tab${t.key===activeTab?' active':''}" data-tab="${t.key}"><span>${t.label}</span><span class="count">${t.slots.length} slots</span></button>`
    ).join('');
    tabsEl.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        activeTab = t.dataset.tab;
        closeDetail();
        renderTabs(); renderMatrix();
      });
    });
  }

  function renderFilters(){
    filterPills.innerHTML = filters.map(f =>
      `<button class="filter-pill${f===activeFilter?' active':''}" data-filter="${f}">${f}</button>`
    ).join('');
    filterPills.querySelectorAll('.filter-pill').forEach(p => {
      p.addEventListener('click', () => {
        activeFilter = p.dataset.filter;
        renderFilters(); renderMatrix();
      });
    });
  }

  function passesColumnFilters(state){
    for (const slotKey of Object.keys(columnFilters)){
      const allowed = columnFilters[slotKey];
      if (!allowed || allowed.length === 0) continue;
      const c = getCell(state.slug, activeTab, slotKey);
      if (!allowed.includes(c.status)) return false;
    }
    return true;
  }

  function applySort(rows){
    if (!sortState.col) return rows;
    const dir = sortState.dir === 'asc' ? 1 : -1;
    if (sortState.col === 'juris'){
      return rows.slice().sort((a,b) => a.name.localeCompare(b.name) * dir);
    }
    const slotKey = sortState.col;
    return rows.slice().sort((a,b) => {
      const ca = getCell(a.slug, activeTab, slotKey);
      const cb = getCell(b.slug, activeTab, slotKey);
      const ra = STATUS_RANK[ca.status] ?? 9;
      const rb = STATUS_RANK[cb.status] ?? 9;
      if (ra !== rb) return (ra - rb) * dir;
      return a.name.localeCompare(b.name); // stable tiebreak by name asc
    });
  }

  function sortIcon(col){
    if (sortState.col !== col) return '↕';
    return sortState.dir === 'asc' ? '↑' : '↓';
  }

  function renderMatrix(){
    const tab = tabs.find(t => t.key === activeTab);
    if (!tab) return;
    const slots = tab.slots;
    const cols = `160px repeat(${slots.length},1fr)`;

    let html = '';
    html += `<div class="matrix-row head" style="grid-template-columns:${cols}">`;
    const entityLbl = meta.entity_label || 'Jurisdiction';
    const isoSub = meta.iso_sub_label || 'ISO · alphabetical';
    const jurisSorted = sortState.col === 'juris' ? ' is-sorted' : '';
    html += `<div class="col-juris${jurisSorted}" data-sort-col="juris" title="Click to sort by ${entityLbl.toLowerCase()}"><div class="name">${entityLbl} <span class="sort-ind">${sortIcon('juris')}</span></div><div class="iso">${isoSub}</div></div>`;
    slots.forEach(s => {
      const isSorted = sortState.col === s.key ? ' is-sorted' : '';
      const fActive = (columnFilters[s.key] && columnFilters[s.key].length > 0) ? ' has-filter' : '';
      const fCount = (columnFilters[s.key] && columnFilters[s.key].length > 0) ? `<span class="fcount">${columnFilters[s.key].length}</span>` : '';
      html += `<div class="col-slot">
        <div class="col-slot-label${isSorted}" data-sort-col="${s.key}" title="Click to sort by ${s.label}">${s.label} <span class="sort-ind">${sortIcon(s.key)}</span></div>
        <div class="col-slot-controls">
          <button class="th-filter${fActive}" data-filter-col="${s.key}" title="Filter ${s.label}">Filter${fCount}</button>
        </div>
      </div>`;
    });
    html += `</div>`;

    const filtered = states.filter(passesFilter).filter(passesColumnFilters);
    const sorted = applySort(filtered);
    sorted.forEach(state => {
      html += `<div class="matrix-row" style="grid-template-columns:${cols}">`;
      const jurisHref = state.juris_path || `pai-app-juris-${state.slug}.html`;
      html += `<div class="col-juris"><div class="name"><a href="${jurisHref}">${state.name}</a></div><div class="iso">${state.iso}</div></div>`;
      slots.forEach(s => {
        const c = getCell(state.slug, activeTab, s.key);
        const summaryShort = STATUS_LABELS[c.status] || c.status;
        html += `<div class="col-slot" data-slug="${state.slug}" data-slot="${s.key}">
          <div class="pip s-${c.status}"></div>
          <div class="summary-line">${summaryShort}</div>
        </div>`;
      });
      html += `</div>`;
    });

    if (sorted.length === 0){
      html += `<div class="matrix-row" style="grid-template-columns:1fr;padding:32px;text-align:center;color:var(--text-mute);font-size:13px">No rows match the current filters. <button onclick="window.__resetCols()" style="background:none;border:0;color:var(--accent);text-decoration:underline;cursor:pointer;font-size:13px;padding:0;margin-left:6px">Clear column filters</button></div>`;
    }

    matrix.innerHTML = html;

    matrix.querySelectorAll('.col-slot[data-slug]').forEach(cell => {
      cell.addEventListener('click', () => openDetail(cell.dataset.slug, cell.dataset.slot, cell));
    });
    matrix.querySelectorAll('[data-sort-col]').forEach(el => {
      el.addEventListener('click', () => {
        const k = el.dataset.sortCol;
        if (sortState.col === k){
          sortState = { col: k, dir: sortState.dir === 'asc' ? 'desc' : 'asc' };
        } else {
          sortState = { col: k, dir: 'asc' };
        }
        renderMatrix();
      });
    });
    matrix.querySelectorAll('.th-filter[data-filter-col]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        openFilterPopover(btn, btn.dataset.filterCol);
      });
    });
  }

  // expose reset for the empty-state link
  window.__resetCols = function(){ columnFilters = {}; renderMatrix(); };

  // ── Filter popover ─────────────────────────────────
  function closeFilterPopover(){
    document.getElementById('th-filter-popover')?.remove();
    document.removeEventListener('click', closeFilterPopoverOnClickOutside, true);
  }
  function closeFilterPopoverOnClickOutside(e){
    if (!e.target.closest('#th-filter-popover')) closeFilterPopover();
  }
  function openFilterPopover(anchor, slotKey){
    closeFilterPopover();
    const tab = tabs.find(t => t.key === activeTab);
    const slot = tab.slots.find(s => s.key === slotKey);
    const current = columnFilters[slotKey] || [];
    const pop = document.createElement('div');
    pop.className = 'th-filter-popover';
    pop.id = 'th-filter-popover';
    pop.innerHTML = `
      <div class="fpop-title">Filter · ${slot.label}</div>
      ${['verified','pending','source'].map(s => `
        <label class="fpop-row">
          <input type="checkbox" value="${s}" ${current.includes(s) ? 'checked' : ''}>
          <span class="fpip s-${s}"></span>
          <span>${STATUS_LABELS[s]}</span>
        </label>`).join('')}
      <div class="fpop-actions">
        <button class="fpop-clear">Clear</button>
        <button class="fpop-apply">Apply</button>
      </div>`;
    document.body.appendChild(pop);
    const r = anchor.getBoundingClientRect();
    pop.style.top = (r.bottom + 6) + 'px';
    pop.style.left = Math.max(8, Math.min(window.innerWidth - 232, r.left + r.width/2 - 110)) + 'px';
    pop.querySelector('.fpop-clear').addEventListener('click', () => {
      delete columnFilters[slotKey];
      closeFilterPopover();
      renderMatrix();
    });
    pop.querySelector('.fpop-apply').addEventListener('click', () => {
      const checked = Array.from(pop.querySelectorAll('input:checked')).map(i => i.value);
      if (checked.length === 0) delete columnFilters[slotKey];
      else columnFilters[slotKey] = checked;
      closeFilterPopover();
      renderMatrix();
    });
    pop.querySelectorAll('.fpop-row').forEach(row => {
      row.addEventListener('click', e => {
        if (e.target.tagName !== 'INPUT'){
          const cb = row.querySelector('input');
          cb.checked = !cb.checked;
        }
      });
    });
    setTimeout(() => document.addEventListener('click', closeFilterPopoverOnClickOutside, true), 0);
  }

  // Detail panel
  const detail = document.getElementById('detail');
  const dJuris = document.getElementById('d-juris');
  const dSlot = document.getElementById('d-slot');
  const dPill = document.getElementById('d-pill');
  const dMeta = document.getElementById('d-meta');
  const dShort = document.getElementById('d-short');
  const dFull = document.getElementById('d-full');
  const dIconText = document.getElementById('d-icon-text');
  const dIconPip = document.getElementById('d-icon-pip');
  const dSource = document.getElementById('d-source');
  const dSourceWrap = document.getElementById('d-source-wrap');
  const dClose = document.getElementById('d-close');

  function openDetail(slug, slotKey, cellEl){
    const state = states.find(s => s.slug === slug);
    const tab = tabs.find(t => t.key === activeTab);
    const slot = tab.slots.find(s => s.key === slotKey);
    if (!state || !slot) return;
    const c = getCell(slug, activeTab, slotKey);
    const jurisHref = state.juris_path || `pai-app-juris-${state.slug}.html`;
    dJuris.innerHTML = `<a href="${jurisHref}">${state.name} · ${state.iso}</a>`;
    dSlot.textContent = slot.label;
    const pillCls = 'pill pill-' + c.status;
    dPill.className = pillCls;
    dPill.textContent = ({verified:'Verified', pending:'Pending verify', source:'Awaiting source'})[c.status];
    dMeta.textContent = c.status === 'verified' ? 'Verified by PAI Research Team' :
                        c.status === 'pending' ? 'Sourced, awaiting reviewer sign-off' :
                        'No primary source captured yet';
    dIconText.textContent = ({verified:'Verified', pending:'Pending', source:'Awaiting'})[c.status];
    dIconPip.className = 'legend-pip s-' + c.status;
    dShort.textContent = c.short;
    dFull.textContent = c.full;
    if (c.source){ dSourceWrap.style.display = ''; dSource.textContent = c.source; dSource.href = c.source; }
    else { dSourceWrap.style.display = 'none'; }
    matrix.querySelectorAll('.col-slot.is-active').forEach(o => o.classList.remove('is-active'));
    if (cellEl) cellEl.classList.add('is-active');
    detail.hidden = false;
    shell.classList.add('detail-open');
  }
  function closeDetail(){
    shell.classList.remove('detail-open');
    matrix.querySelectorAll('.col-slot.is-active').forEach(c => c.classList.remove('is-active'));
  }
  dClose.addEventListener('click', closeDetail);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

  renderTabs(); renderFilters(); renderMatrix();
})();
</script>
</body>
</html>
