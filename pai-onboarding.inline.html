<!--
  PAI Onboarding v2 — full-screen stepper + streaming briefing.
  Self-contained: vanilla JS, inline <style>, no external scripts.
  Paste verbatim into each page before the closing body tag.

  Page role is auto-detected:
    - body.onboarding-home  → full stepper + dashboard personalisation + tour
    - anywhere else         → helper card + tour-step resume only

  Storage (localStorage, will move server-side once Clerk metadata is wired):
    pai-onboarding-v2: {v, completedAt, skipped, role, jurisdictions:[], topics:[], cadence, name}
    pai-tour-v1:       {completed, dismissed, step}
    pai-last-visit:    ISO string (used for "since you last visited")

  Server-side TODOs (// TODO:server in code):
    - profile fields should live on Clerk publicMetadata (POST /api/user/brief)
    - name should come from Clerk session, not be asked
    - last-visit + "alerts since last visit" should be server-computed
    - briefing lines should be generated server-side from real jurData + alerts tables
-->
<style id="pai-onb-styles">
  .pai-onb-root, .pai-onb-root * { box-sizing: border-box; }
  .pai-onb-root { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* ============================================================
     v2 Stepper — full-screen dark takeover
     ============================================================ */
  .pai-step-takeover {
    position: fixed; inset: 0; background: #06101e; color: #f7fafc;
    z-index: 9500; /* above jur-overlay (9000) since this owns the screen on first login */
    display: none; flex-direction: column;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .pai-step-takeover.open { display: flex; }
  .pai-step-takeover.closing { animation: pstFadeOut .32s cubic-bezier(.4,0,.2,1) forwards; }
  @keyframes pstFadeOut { from { opacity: 1; } to { opacity: 0; } }

  /* Topbar */
  .pst-topbar { display: flex; align-items: center; justify-content: space-between; padding: 22px 32px; flex-shrink: 0; }
  .pst-brand { display: flex; align-items: center; gap: 10px; }
  .pst-brand-mark { width: 22px; height: 22px; background: #3b9eff; color: #06101e; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: 'Inter'; font-style: italic; font-weight: 700; font-size: 14px; letter-spacing: -0.5px; }
  .pst-brand-name { font-size: 13.5px; font-weight: 600; color: #f7fafc; letter-spacing: -0.005em; }
  .pst-brand-name em { font-style: italic; font-weight: 500; color: #cbd5e1; }
  .pst-exit { background: transparent; border: none; color: #6b7a8f; font-size: 12px; font-weight: 500; cursor: pointer; letter-spacing: 0.01em; }
  .pst-exit:hover { color: #cbd5e1; }

  /* Breadcrumb dots */
  .pst-crumbs { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 4px 0 0; flex-shrink: 0; }
  .pst-crumbs .pst-crumb-dot { width: 22px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; transition: background .25s, width .25s; }
  .pst-crumbs .pst-crumb-dot.done { background: rgba(59,158,255,0.45); }
  .pst-crumbs .pst-crumb-dot.current { background: #3b9eff; width: 44px; }

  /* Stage */
  .pst-stage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 32px; overflow-y: auto; min-height: 0; }
  .pst-screen { width: 100%; max-width: 720px; opacity: 0; transform: translateY(8px); transition: opacity .35s cubic-bezier(.4,0,.2,1), transform .35s cubic-bezier(.4,0,.2,1); }
  .pst-screen.in { opacity: 1; transform: translateY(0); }
  .pst-screen.out { opacity: 0; transform: translateY(-8px); transition: opacity .2s, transform .2s; }

  .pst-eyebrow { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #6b7a8f; margin: 0 0 16px; }
  .pst-eyebrow .pst-eyebrow-accent { color: #3b9eff; }
  .pst-title { font-size: 44px; font-weight: 600; line-height: 1.08; letter-spacing: -0.022em; color: #f7fafc; margin: 0 0 12px; }
  .pst-title em { font-style: normal; color: #3b9eff; }
  .pst-sub { font-size: 16px; font-weight: 400; line-height: 1.55; color: #8a93a3; margin: 0 0 32px; max-width: 580px; }
  .pst-hint { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #4a556b; letter-spacing: 0.06em; margin-top: 14px; }
  .pst-hint kbd { font-family: inherit; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 3px; padding: 1px 6px; font-size: 10.5px; color: #cbd5e1; margin: 0 2px; }

  /* Role buttons (vertical list with numeric shortcut) */
  .pst-role-list { display: flex; flex-direction: column; gap: 8px; }
  .pst-role-btn { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; padding: 16px 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; cursor: pointer; transition: background .15s, border-color .15s, transform .15s; color: #f7fafc; }
  .pst-role-btn:hover { background: rgba(59,158,255,0.06); border-color: rgba(59,158,255,0.28); }
  .pst-role-btn.on { background: rgba(59,158,255,0.10); border-color: #3b9eff; }
  .pst-role-btn.focus { border-color: rgba(59,158,255,0.55); background: rgba(59,158,255,0.08); }
  .pst-role-shortcut { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #6b7a8f; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); border-radius: 4px; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .pst-role-btn.on .pst-role-shortcut { color: #3b9eff; border-color: rgba(59,158,255,0.4); background: rgba(59,158,255,0.08); }
  .pst-role-label { font-size: 15px; font-weight: 500; color: #f7fafc; flex: 1; }
  .pst-role-tag { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #6b7a8f; letter-spacing: 0.04em; }

  /* Chip clouds (jurisdictions, topics) */
  .pst-chip-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
  .pst-chip { display: inline-flex; align-items: center; gap: 8px; height: 36px; padding: 0 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; font-size: 13.5px; color: #f7fafc; cursor: pointer; transition: background .12s, border-color .12s; font-weight: 500; }
  .pst-chip:hover { background: rgba(59,158,255,0.08); border-color: rgba(59,158,255,0.28); }
  .pst-chip.on { background: rgba(59,158,255,0.14); border-color: #3b9eff; color: #fff; }
  .pst-chip.on::before { content: '✓'; font-size: 11px; color: #3b9eff; }
  .pst-chip.focus { outline: 2px solid rgba(59,158,255,0.35); outline-offset: 2px; }

  .pst-jur-search { margin-top: 14px; position: relative; max-width: 460px; }
  .pst-jur-search input { width: 100%; padding: 10px 12px 10px 36px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); border-radius: 6px; font-family: inherit; font-size: 13.5px; color: #f7fafc; outline: none; }
  .pst-jur-search input::placeholder { color: #6b7a8f; }
  .pst-jur-search input:focus { border-color: #3b9eff; background: rgba(59,158,255,0.06); }
  .pst-jur-search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; stroke: #6b7a8f; fill: none; stroke-width: 2; }
  .pst-jur-results { margin-top: 6px; max-height: 180px; overflow-y: auto; background: #0a1729; border: 1px solid rgba(255,255,255,0.10); border-radius: 6px; display: none; }
  .pst-jur-results.show { display: block; }
  .pst-jur-row { padding: 8px 14px; font-size: 13px; color: #cbd5e1; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
  .pst-jur-row:hover { background: rgba(59,158,255,0.08); color: #fff; }
  .pst-jur-row-region { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #6b7a8f; }

  .pst-section-meta { display: flex; align-items: center; justify-content: space-between; margin: -8px 0 18px; }
  .pst-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #3b9eff; font-weight: 600; letter-spacing: 0.04em; }
  .pst-micro { font-size: 12px; color: #6b7a8f; }

  /* Cadence options */
  .pst-cadence-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .pst-cadence-btn { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; padding: 16px 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; cursor: pointer; transition: background .15s, border-color .15s; text-align: left; color: #f7fafc; }
  .pst-cadence-btn:hover { background: rgba(59,158,255,0.06); border-color: rgba(59,158,255,0.28); }
  .pst-cadence-btn.on { background: rgba(59,158,255,0.10); border-color: #3b9eff; }
  .pst-cadence-btn.focus { border-color: rgba(59,158,255,0.55); }
  .pst-cadence-head { display: flex; align-items: center; gap: 8px; width: 100%; }
  .pst-cadence-time { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; color: #f7fafc; letter-spacing: -0.01em; }
  .pst-cadence-btn.on .pst-cadence-time { color: #3b9eff; }
  .pst-cadence-shortcut { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #6b7a8f; border: 1px solid rgba(255,255,255,0.10); border-radius: 3px; padding: 1px 5px; }
  .pst-cadence-desc { font-size: 12.5px; color: #8a93a3; line-height: 1.45; }

  /* Foot */
  .pst-foot { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px 26px; flex-shrink: 0; gap: 16px; min-height: 86px; }
  .pst-back { background: transparent; border: none; color: #6b7a8f; font-size: 13px; font-weight: 500; cursor: pointer; padding: 8px 14px; border-radius: 6px; }
  .pst-back:hover { color: #cbd5e1; background: rgba(255,255,255,0.04); }
  .pst-back[disabled] { opacity: 0; pointer-events: none; }
  .pst-next { display: inline-flex; align-items: center; gap: 10px; padding: 10px 20px; background: #3b9eff; color: #06101e; border: none; border-radius: 7px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: background .15s, transform .15s; letter-spacing: -0.005em; }
  .pst-next:hover { background: #5cb0ff; }
  .pst-next[disabled] { background: rgba(255,255,255,0.10); color: #6b7a8f; cursor: not-allowed; }
  .pst-next kbd { font-family: 'IBM Plex Mono', monospace; background: rgba(6,16,30,0.18); color: #06101e; border: 1px solid rgba(6,16,30,0.12); border-radius: 3px; font-size: 11px; padding: 0px 5px; font-weight: 600; }
  .pst-next[disabled] kbd { background: rgba(255,255,255,0.04); color: #6b7a8f; border-color: rgba(255,255,255,0.08); }

  /* Running "Your brief" card — bottom-left, builds as they answer */
  .pst-brief-card { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: center; font-size: 12.5px; color: #6b7a8f; font-weight: 500; opacity: 0; transition: opacity .25s; }
  .pst-brief-card.show { opacity: 1; }
  .pst-brief-label { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #4a556b; letter-spacing: 0.12em; text-transform: uppercase; }
  .pst-brief-pill { display: inline-flex; align-items: center; padding: 3px 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; color: #cbd5e1; font-weight: 500; font-size: 11.5px; }

  /* Welcome screen (flourish) */
  .pst-welcome { text-align: left; }
  .pst-welcome .pst-title { font-size: 54px; letter-spacing: -0.025em; }
  .pst-welcome .pst-sub { font-size: 17px; margin-bottom: 10px; }
  .pst-welcome-meta { margin-top: 28px; display: flex; gap: 24px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #6b7a8f; letter-spacing: 0.06em; }
  .pst-welcome-meta span b { color: #cbd5e1; font-weight: 600; }

  /* Streaming briefing screen */
  .pst-briefing { text-align: left; max-width: 720px; }
  .pst-briefing .pst-eyebrow { margin-bottom: 14px; }
  .pst-briefing-hello { font-size: 28px; font-weight: 600; letter-spacing: -0.015em; color: #f7fafc; line-height: 1.25; margin: 0 0 26px; }
  .pst-briefing-hello em { font-style: normal; color: #3b9eff; }
  .pst-briefing-lines { display: flex; flex-direction: column; gap: 14px; }
  .pst-briefing-line { display: flex; gap: 14px; padding: 12px 16px; background: rgba(255,255,255,0.02); border-left: 2px solid rgba(59,158,255,0.28); border-radius: 0 6px 6px 0; opacity: 0; transform: translateX(-6px); transition: opacity .35s cubic-bezier(.4,0,.2,1), transform .35s cubic-bezier(.4,0,.2,1); }
  .pst-briefing-line.in { opacity: 1; transform: translateX(0); }
  .pst-briefing-line-num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #4a556b; font-weight: 600; letter-spacing: 0.06em; padding-top: 3px; flex-shrink: 0; min-width: 24px; }
  .pst-briefing-line-body { font-size: 14.5px; color: #cbd5e1; line-height: 1.55; }
  .pst-briefing-line-body b { color: #f7fafc; font-weight: 600; }
  .pst-briefing-line-body .pst-brief-caret { display: inline-block; width: 6px; height: 14px; background: #3b9eff; margin-left: 2px; vertical-align: text-bottom; animation: pstCaret 1s steps(2) infinite; }
  .pst-briefing-line.typing .pst-brief-caret { display: inline-block; }
  @keyframes pstCaret { 50% { opacity: 0; } }

  @media (max-width: 640px) {
    .pst-title { font-size: 30px; }
    .pst-welcome .pst-title { font-size: 36px; }
    .pst-cadence-list { grid-template-columns: 1fr; }
    .pst-stage { padding: 16px; }
    .pst-topbar { padding: 16px; }
    .pst-foot { padding: 14px 16px 18px; }
    .pst-brief-card { display: none; }
    .pst-briefing-hello { font-size: 22px; }
  }

  /* ============================================================
     Personalisation banner (home, skipped-but-may-come-back)
     ============================================================ */
  .pai-onb-brief-chip { display: none; margin: -14px 0 18px; font-size: 12px; color: #5e6878; }
  .pai-onb-brief-chip.show { display: inline-flex; align-items: center; gap: 8px; }
  .pai-onb-brief-chip b { color: #06101e; font-weight: 600; }
  .pai-onb-brief-chip a { color: #0176d3; cursor: pointer; font-weight: 500; text-decoration: none; }
  .pai-onb-brief-chip a:hover { text-decoration: underline; }

  /* ============================================================
     Helper card (pinned bottom-right)
     ============================================================ */
  .pai-onb-helper { position: fixed; right: 20px; bottom: 20px; width: 280px; background: #fff; border: 1px solid #dbe1ea; border-radius: 10px; box-shadow: 0 6px 20px rgba(10,23,41,0.12); z-index: 7000; padding: 14px 16px; display: none; }
  .pai-onb-helper.show { display: block; }
  .pai-onb-helper .oh-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
  .pai-onb-helper .oh-title { font-size: 13.5px; font-weight: 600; color: #0a1729; line-height: 1.4; }
  .pai-onb-helper .oh-close { color: #8a93a3; cursor: pointer; background: transparent; border: none; padding: 0; font-size: 16px; line-height: 1; flex-shrink: 0; }
  .pai-onb-helper .oh-close:hover { color: #2a3548; }
  .pai-onb-helper .oh-body { font-size: 12.5px; color: #5e6878; line-height: 1.55; margin-bottom: 10px; }
  .pai-onb-helper .oh-actions { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .pai-onb-helper .oh-progress { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #8a93a3; letter-spacing: 0.05em; }
  .pai-onb-helper .oh-cta { font-size: 12.5px; font-weight: 600; color: #0176d3; cursor: pointer; background: transparent; border: none; padding: 0; }
  .pai-onb-helper .oh-cta:hover { color: #014486; }

  /* ============================================================
     Tour spotlight
     ============================================================ */
  .pai-onb-spot-mask { position: fixed; inset: 0; pointer-events: none; z-index: 7500; display: none; }
  .pai-onb-spot-mask.show { display: block; }
  .pai-onb-spot-ring { position: fixed; border: 2px solid #0176d3; border-radius: 8px; box-shadow: 0 0 0 9999px rgba(6,16,30,0.38); z-index: 7501; pointer-events: none; transition: top .2s, left .2s, width .2s, height .2s; display: none; }
  .pai-onb-spot-ring.show { display: block; }
  .pai-onb-tip { position: fixed; width: 300px; background: #fff; border: 1px solid #dbe1ea; border-radius: 10px; box-shadow: 0 8px 24px rgba(10,23,41,0.16); z-index: 7502; padding: 14px 16px; display: none; }
  .pai-onb-tip.show { display: block; }
  .pai-onb-tip .ot-step { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #8a93a3; letter-spacing: 0.08em; margin-bottom: 4px; }
  .pai-onb-tip .ot-title { font-size: 14px; font-weight: 600; color: #0a1729; margin-bottom: 6px; line-height: 1.4; }
  .pai-onb-tip .ot-body { font-size: 12.5px; color: #5e6878; line-height: 1.55; margin-bottom: 12px; }
  .pai-onb-tip .ot-actions { display: flex; align-items: center; justify-content: space-between; }
  .pai-onb-tip .ot-skip { font-size: 12px; color: #8a93a3; cursor: pointer; background: transparent; border: none; padding: 0; }
  .pai-onb-tip .ot-skip:hover { color: #2a3548; }
  .pai-onb-tip .ot-nav { display: flex; gap: 6px; }
  .pai-onb-tip .ot-btn { height: 28px; padding: 0 12px; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid transparent; }
  .pai-onb-tip .ot-back { background: transparent; color: #5e6878; }
  .pai-onb-tip .ot-back:hover { color: #0a1729; background: #f8fafc; }
  .pai-onb-tip .ot-next { background: #0176d3; color: #fff; }
  .pai-onb-tip .ot-next:hover { background: #014486; }

  @media (max-width: 640px) {
    .pai-onb-helper { right: 12px; bottom: 12px; width: calc(100vw - 24px); max-width: 320px; }
    .pai-onb-tip { width: calc(100vw - 32px); max-width: 300px; }
  }
</style>

<div class="pai-onb-root">
  <!-- v2 Stepper (takes over the screen on first login / re-edit) -->
  <div class="pai-step-takeover" id="paiStepTakeover" role="dialog" aria-modal="true" aria-labelledby="paiStepTitle">
    <div class="pst-topbar">
      <div class="pst-brand">
        <span class="pst-brand-mark">P</span>
        <span class="pst-brand-name">Principles<em>AI</em></span>
      </div>
      <button class="pst-exit" id="paiStepExit" type="button">Skip for now</button>
    </div>
    <div class="pst-crumbs" id="paiStepCrumbs"></div>
    <div class="pst-stage" id="paiStepStage"></div>
    <div class="pst-foot">
      <button class="pst-back" id="paiStepBack" type="button">← Back</button>
      <div class="pst-brief-card" id="paiStepBriefCard"></div>
      <button class="pst-next" id="paiStepNext" type="button">Continue <kbd>↵</kbd></button>
    </div>
  </div>

  <!-- Helper card (pinned bottom-right, global) -->
  <div class="pai-onb-helper" id="paiOnbHelper">
    <div class="oh-head">
      <div class="oh-title" id="paiOnbHelperTitle">👋 New here?</div>
      <button class="oh-close" id="paiOnbHelperClose" aria-label="Dismiss">×</button>
    </div>
    <div class="oh-body" id="paiOnbHelperBody">Five quick stops and you'll know the room.</div>
    <div class="oh-actions">
      <span class="oh-progress" id="paiOnbHelperProgress"></span>
      <button class="oh-cta" id="paiOnbHelperCta">Take the tour →</button>
    </div>
  </div>

  <!-- Tour spotlight -->
  <div class="pai-onb-spot-mask" id="paiOnbSpotMask"></div>
  <div class="pai-onb-spot-ring" id="paiOnbSpotRing"></div>
  <div class="pai-onb-tip" id="paiOnbTip" role="dialog" aria-live="polite">
    <div class="ot-step" id="paiOnbTipStep"></div>
    <div class="ot-title" id="paiOnbTipTitle"></div>
    <div class="ot-body" id="paiOnbTipBody"></div>
    <div class="ot-actions">
      <button class="ot-skip" id="paiOnbTipSkip">Skip tour</button>
      <div class="ot-nav">
        <button class="ot-btn ot-back" id="paiOnbTipBack">Back</button>
        <button class="ot-btn ot-next" id="paiOnbTipNext">Next</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // ================== Config ==================
  var ONB_KEY = 'pai-onboarding-v2';
  var TOUR_KEY = 'pai-tour-v1';
  var VISIT_KEY = 'pai-last-visit';

  var TOPICS = ['AI', 'Privacy', 'Cyber', 'IP', 'Trust & Safety', 'Standards', 'Vendor & Procurement', 'Incident Response'];
  var ROLES = [
    { k: 'counsel',    l: 'In-house counsel',           tag: 'LEGAL'   },
    { k: 'dpo',        l: 'Data Protection Officer',    tag: 'PRIVACY' },
    { k: 'ciso',       l: 'CISO / Security lead',       tag: 'SECURITY'},
    { k: 'ai-gov',     l: 'AI governance lead',         tag: 'AI'      },
    { k: 'consultant', l: 'Consultant / external counsel', tag: 'ADVISORY'},
    { k: 'other',      l: 'Something else',             tag: ''        }
  ];
  var POPULAR_JURS = [
    'United Kingdom','European Union','United States','Germany','France',
    'Canada','Australia','Singapore','Japan','Brazil','India','China'
  ];
  var CADENCE = [
    { k: '0700',   time: '07:00 BST', desc: 'Before the stand-up. Sharp start.' },
    { k: '0830',   time: '08:30 BST', desc: 'After coffee, before inbox.' },
    { k: 'midday', time: 'Midday',    desc: 'Lunch-break reset.' },
    { k: 'none',   time: 'No daily',  desc: 'Alerts only, as things move.' }
  ];

  var STEPS = ['welcome','role','jurisdictions','topics','cadence','briefing'];
  // breadcrumbs show 4 dots for the 4 content steps (role, jurisdictions, topics, cadence)
  var BREADCRUMB_STEPS = ['role','jurisdictions','topics','cadence'];

  var TOUR_STOPS = [
    { key:'jurisdictions', selector:'.home-jur-btn',
      title:'Switch jurisdiction lens',
      body:'Drop into any country, state, or bloc. Everything below — alerts, consultations, enforcement — refocuses to that scope.',
      placement:'bottom' },
    { key:'topics', selector:'a.sidebar-nav-item[href="pai-app-topics.html"], .sidebar-nav-item[data-pai-tour="topics"]',
      title:'The topic lens',
      body:'Cut the same world by subject instead — AI rules, privacy, cyber, IP, standards. Handy when a topic spans ten jurisdictions at once.',
      placement:'right' },
    { key:'watchlist', selector:'.tw-cell:first-child, a.sidebar-nav-item[href="pai-app-watchlist.html"], [data-pai-tour="watchlist"]',
      title:'Your Watchlist',
      body:'Save any law, authority, or consultation and it lives here. We\'ll nudge you when something moves — draft published, deadline closing, guidance revised.',
      placement:'bottom' },
    { key:'alerts', selector:'[data-pai-tour="alerts"]',
      title:'Alerts since your last visit',
      body:'Filtered by your brief, not the full firehose. The bell shows what\'s new in your jurisdictions and topics since you were last here.',
      placement:'bottom' },
    { key:'search', selector:'.header-search',
      title:'Search the whole library',
      body:'Laws, authorities, consultations, cases, decisions — typed plain. Try "EU AI Act Article 5" or "ICO reprimand 2025".',
      placement:'bottom' }
  ];

  // ================== Storage ==================
  function loadJSON(k, fallback){
    try { var raw = localStorage.getItem(k); return raw ? JSON.parse(raw) : fallback; }
    catch(e){ return fallback; }
  }
  function saveJSON(k, v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
  function getOnb(){ return loadJSON(ONB_KEY, null); }
  function setOnb(v){ saveJSON(ONB_KEY, v); }
  function getTour(){ return loadJSON(TOUR_KEY, { completed:false, dismissed:false, step:0 }); }
  function setTour(v){ saveJSON(TOUR_KEY, v); }
  function picksComplete(o){ return o && !o.skipped && !!o.role && (o.jurisdictions||[]).length>0 && (o.topics||[]).length>0; }

  // ================== Page role ==================
  var isHome = /pai-home-private\.html$/.test(location.pathname) ||
               document.body.classList.contains('onboarding-home');

  function tagTourAnchors(){
    // Second header icon button is the bell (first is bookmark, third is settings link)
    var icons = document.querySelectorAll('.header-icon-btn');
    if (icons.length >= 2 && !icons[1].hasAttribute('data-pai-tour')) icons[1].setAttribute('data-pai-tour','alerts');
  }

  // ================== Stepper state ==================
  var takeover = null, stage = null, crumbs = null, backBtn = null, nextBtn = null, exitBtn = null, briefCard = null;
  var stepIdx = 0; // index into STEPS
  var picks = { role:null, jurisdictions:[], topics:[], cadence:null, name:'' };
  var stepperOpen = false;
  var focusIdx = 0; // index of currently focused option within a step

  function openStepper(existing, startAtStep){
    if (!takeover) return;
    picks = {
      role: existing && existing.role || null,
      jurisdictions: (existing && existing.jurisdictions) ? existing.jurisdictions.slice() : [],
      topics: (existing && existing.topics) ? existing.topics.slice() : [],
      cadence: existing && existing.cadence || null,
      name: existing && existing.name || ''
    };
    stepIdx = (typeof startAtStep === 'number') ? startAtStep : 0;
    takeover.classList.remove('closing');
    takeover.classList.add('open');
    stepperOpen = true;
    document.body.style.overflow = 'hidden';
    renderStep();
  }
  function closeStepper(){
    if (!takeover) return;
    stepperOpen = false;
    takeover.classList.add('closing');
    setTimeout(function(){
      takeover.classList.remove('open','closing');
      document.body.style.overflow = '';
    }, 320);
  }

  function renderCrumbs(){
    if (!crumbs) return;
    var currentStepName = STEPS[stepIdx];
    var currentCrumbIdx = BREADCRUMB_STEPS.indexOf(currentStepName);
    // hide crumbs on welcome + briefing
    if (currentCrumbIdx === -1) { crumbs.innerHTML = ''; return; }
    crumbs.innerHTML = BREADCRUMB_STEPS.map(function(_, i){
      var cls = 'pst-crumb-dot';
      if (i < currentCrumbIdx) cls += ' done';
      else if (i === currentCrumbIdx) cls += ' current';
      return '<span class="'+cls+'"></span>';
    }).join('');
  }

  function renderBriefCard(){
    if (!briefCard) return;
    var parts = [];
    if (picks.role) { var r = ROLES.filter(function(x){return x.k===picks.role;})[0]; if (r) parts.push({label:'ROLE', v:r.l}); }
    if (picks.jurisdictions.length) parts.push({label:'JURIS', v: summariseJurs(picks.jurisdictions)});
    if (picks.topics.length) parts.push({label:'TOPICS', v: picks.topics.slice(0,3).join(', ') + (picks.topics.length>3 ? ' +'+(picks.topics.length-3) : '')});
    if (picks.cadence) { var c = CADENCE.filter(function(x){return x.k===picks.cadence;})[0]; if (c) parts.push({label:'BRIEF', v:c.time}); }
    if (!parts.length) { briefCard.classList.remove('show'); briefCard.innerHTML=''; return; }
    briefCard.classList.add('show');
    briefCard.innerHTML = '<span class="pst-brief-label">Your brief</span>' +
      parts.map(function(p){ return '<span class="pst-brief-pill">'+escapeHTML(p.v)+'</span>'; }).join('');
  }

  function summariseJurs(list){
    var map = {'United Kingdom':'UK','European Union':'EU','United States':'US'};
    var mapped = list.map(function(j){ return map[j] || j; });
    if (mapped.length <= 2) return mapped.join(' · ');
    return mapped.slice(0,2).join(' · ') + ' +' + (mapped.length-2);
  }

  function escapeHTML(s){ return String(s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }

  // ================== Screen renderers ==================
  function renderStep(){
    var name = STEPS[stepIdx];
    renderCrumbs();
    renderBriefCard();
    if (name === 'welcome')       renderWelcome();
    else if (name === 'role')     renderRole();
    else if (name === 'jurisdictions') renderJurisdictions();
    else if (name === 'topics')   renderTopics();
    else if (name === 'cadence')  renderCadence();
    else if (name === 'briefing') renderBriefing();
    updateFoot();
  }

  function mountScreen(html){
    // animate out then in
    var prev = stage.querySelector('.pst-screen');
    if (prev) {
      prev.classList.remove('in');
      prev.classList.add('out');
      setTimeout(function(){
        stage.innerHTML = html;
        var cur = stage.querySelector('.pst-screen');
        if (cur) requestAnimationFrame(function(){ cur.classList.add('in'); });
        bindCurrentScreen();
      }, 150);
    } else {
      stage.innerHTML = html;
      var cur = stage.querySelector('.pst-screen');
      if (cur) requestAnimationFrame(function(){ cur.classList.add('in'); });
      bindCurrentScreen();
    }
  }

  function renderWelcome(){
    focusIdx = 0;
    mountScreen(
      '<div class="pst-screen pst-welcome">' +
        '<p class="pst-eyebrow">A quick setup · <span class="pst-eyebrow-accent">60 seconds</span></p>' +
        '<h1 class="pst-title" id="paiStepTitle">Let\'s shape your brief.</h1>' +
        '<p class="pst-sub">Four short questions. Tomorrow\'s dashboard speaks to your remit — AI, privacy, cyber — not the whole world.</p>' +
        '<div class="pst-welcome-meta">' +
          '<span><b>4</b> questions</span>' +
          '<span>Press <b>Enter</b> to begin</span>' +
          '<span><b>Esc</b> to skip</span>' +
        '</div>' +
      '</div>'
    );
  }

  function renderRole(){
    focusIdx = Math.max(0, ROLES.findIndex(function(r){ return r.k === picks.role; }));
    if (focusIdx === -1) focusIdx = 0;
    var html =
      '<div class="pst-screen">' +
        '<p class="pst-eyebrow">Question 01 / 04</p>' +
        '<h2 class="pst-title">What\'s your role?</h2>' +
        '<p class="pst-sub">So we can pitch detail at the right altitude — briefing a DPO reads differently than briefing a CISO.</p>' +
        '<div class="pst-role-list" id="paiRoleList">' +
          ROLES.map(function(r, i){
            return '<button type="button" class="pst-role-btn'+(picks.role===r.k?' on':'')+(i===focusIdx?' focus':'')+'" data-role="'+r.k+'" data-idx="'+i+'">'+
              '<span class="pst-role-shortcut">'+(i+1)+'</span>'+
              '<span class="pst-role-label">'+escapeHTML(r.l)+'</span>'+
              (r.tag ? '<span class="pst-role-tag">'+r.tag+'</span>' : '') +
            '</button>';
          }).join('') +
        '</div>' +
        '<div class="pst-hint"><kbd>1</kbd>–<kbd>6</kbd> to pick · <kbd>↵</kbd> continue</div>' +
      '</div>';
    mountScreen(html);
  }

  function renderJurisdictions(){
    focusIdx = 0;
    var html =
      '<div class="pst-screen">' +
        '<p class="pst-eyebrow">Question 02 / 04</p>' +
        '<h2 class="pst-title">Which jurisdictions do you cover?</h2>' +
        '<p class="pst-sub">Pick any. This is the lens — we\'ll still surface globally material items, but your brief leads with these.</p>' +
        '<div class="pst-section-meta">' +
          '<span class="pst-count" id="paiJurCount">'+picks.jurisdictions.length+' selected</span>' +
          '<span class="pst-micro">Most practitioners pick 3–5</span>' +
        '</div>' +
        '<div class="pst-chip-cloud" id="paiJurChips"></div>' +
        '<div class="pst-jur-search">' +
          '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
          '<input type="text" id="paiJurSearch" placeholder="Search 270+ jurisdictions — US states, EU blocs, provinces…" autocomplete="off" />' +
        '</div>' +
        '<div class="pst-jur-results" id="paiJurResults"></div>' +
        '<div class="pst-hint"><kbd>↵</kbd> continue · <kbd>Tab</kbd> jump to search</div>' +
      '</div>';
    mountScreen(html);
  }

  function renderJurChips(){
    var host = document.getElementById('paiJurChips');
    if (!host) return;
    var list = POPULAR_JURS.slice();
    picks.jurisdictions.forEach(function(j){ if (list.indexOf(j) === -1) list.push(j); });
    host.innerHTML = list.map(function(j){
      var on = picks.jurisdictions.indexOf(j) !== -1;
      return '<button type="button" class="pst-chip'+(on?' on':'')+'" data-jur="'+escapeHTML(j)+'">'+escapeHTML(j)+'</button>';
    }).join('');
    var c = document.getElementById('paiJurCount'); if (c) c.textContent = picks.jurisdictions.length + ' selected';
  }

  function renderTopics(){
    focusIdx = 0;
    var html =
      '<div class="pst-screen">' +
        '<p class="pst-eyebrow">Question 03 / 04</p>' +
        '<h2 class="pst-title">What do you cover?</h2>' +
        '<p class="pst-sub">Tick whatever lands on your desk. AI, privacy, and cybersecurity sit at the core — pick the adjacent lanes too.</p>' +
        '<div class="pst-section-meta">' +
          '<span class="pst-count" id="paiTopCount">'+picks.topics.length+' selected</span>' +
          '<span class="pst-micro">No wrong number</span>' +
        '</div>' +
        '<div class="pst-chip-cloud" id="paiTopChips">' +
          TOPICS.map(function(t){
            var on = picks.topics.indexOf(t) !== -1;
            return '<button type="button" class="pst-chip'+(on?' on':'')+'" data-top="'+escapeHTML(t)+'">'+escapeHTML(t)+'</button>';
          }).join('') +
        '</div>' +
        '<div class="pst-hint"><kbd>↵</kbd> continue</div>' +
      '</div>';
    mountScreen(html);
  }

  function renderCadence(){
    focusIdx = Math.max(0, CADENCE.findIndex(function(c){ return c.k === picks.cadence; }));
    if (focusIdx === -1) focusIdx = 0;
    var html =
      '<div class="pst-screen">' +
        '<p class="pst-eyebrow">Question 04 / 04 · one more, then your briefing</p>' +
        '<h2 class="pst-title">When should we send your daily?</h2>' +
        '<p class="pst-sub">A single email summarising what moved overnight in your jurisdictions and topics. You can change this any time.</p>' +
        '<div class="pst-cadence-list" id="paiCadenceList">' +
          CADENCE.map(function(c, i){
            return '<button type="button" class="pst-cadence-btn'+(picks.cadence===c.k?' on':'')+(i===focusIdx?' focus':'')+'" data-cad="'+c.k+'" data-idx="'+i+'">'+
              '<div class="pst-cadence-head">'+
                '<span class="pst-cadence-time">'+escapeHTML(c.time)+'</span>'+
                '<span class="pst-cadence-shortcut">'+(i+1)+'</span>'+
              '</div>'+
              '<div class="pst-cadence-desc">'+escapeHTML(c.desc)+'</div>'+
            '</button>';
          }).join('') +
        '</div>' +
        '<div class="pst-hint"><kbd>1</kbd>–<kbd>4</kbd> to pick · <kbd>↵</kbd> see your first briefing</div>' +
      '</div>';
    mountScreen(html);
  }

  function renderBriefing(){
    // Save picks now so the dashboard picks them up when stepper closes
    var payload = {
      v: 2,
      completedAt: new Date().toISOString(),
      skipped: false,
      role: picks.role,
      jurisdictions: picks.jurisdictions,
      topics: picks.topics,
      cadence: picks.cadence,
      name: picks.name
      // TODO:server — POST /api/user/brief with this shape
    };
    setOnb(payload);

    var lines = composeBriefing(payload);
    var html =
      '<div class="pst-screen pst-briefing">' +
        '<p class="pst-eyebrow">Your first briefing · <span class="pst-eyebrow-accent">draft</span></p>' +
        '<h2 class="pst-briefing-hello" id="paiBriefHello">'+greeting()+'</h2>' +
        '<div class="pst-briefing-lines" id="paiBriefLines">' +
          lines.map(function(l, i){
            return '<div class="pst-briefing-line" data-i="'+i+'"><span class="pst-briefing-line-num">'+String(i+1).padStart(2,'0')+'</span><span class="pst-briefing-line-body">'+l+'</span></div>';
          }).join('') +
        '</div>' +
      '</div>';
    mountScreen(html);
    // stream lines in one-by-one
    streamBriefingLines();
  }

  function streamBriefingLines(){
    var lines = document.querySelectorAll('#paiBriefLines .pst-briefing-line');
    var stagger = 520;
    lines.forEach(function(line, i){
      setTimeout(function(){ line.classList.add('in'); }, 150 + i * stagger);
    });
    // enable the "Enter dashboard" button after lines finish
    setTimeout(function(){
      if (nextBtn) { nextBtn.disabled = false; nextBtn.classList.add('pst-next-ready'); }
    }, 150 + lines.length * stagger + 200);
  }

  function greeting(){
    var h = new Date().getHours();
    var part = h < 12 ? 'Good morning' : (h < 18 ? 'Good afternoon' : 'Good evening');
    var name = picks.name || '';
    return part + (name ? ', <em>' + escapeHTML(name) + '</em>' : '') + '. Here\'s what moved while you were away.';
  }

  function composeBriefing(p){
    // Templated mock-credible lines keyed off picks + jurData.
    // TODO:server — replace this whole function with a server-rendered briefing.
    var jurs = p.jurisdictions.slice(0, 3);
    var topics = p.topics.map(function(t){ return t.toLowerCase(); });
    var lines = [];
    var primaryJur = jurs[0] || 'your jurisdictions';
    var primaryJurShort = summariseJurs([primaryJur]);

    // scope line
    lines.push('Scoped to <b>' + escapeHTML(summariseJurs(jurs) || 'your picks') + '</b> &middot; ' + escapeHTML(topics.slice(0,3).join(', ') || 'all topics') + '.');

    // jurData-driven lines when available
    if (typeof jurData !== 'undefined') {
      var picked = jurs.filter(function(j){ return jurData[j]; });
      picked.forEach(function(j){
        var d = jurData[j];
        if (d.alerts && d.alerts.length) {
          var a = d.alerts[0];
          lines.push('<b>' + escapeHTML(j) + '</b> &middot; ' + escapeHTML(a.h) + ' <span style="color:#4a556b;">— ' + escapeHTML(a.d) + '</span>');
        }
        if (d.enforcement && d.enforcement.length && lines.length < 6) {
          var e = d.enforcement[0];
          lines.push('<b>Enforcement · ' + escapeHTML(j) + '</b> &middot; ' + escapeHTML(e.h));
        }
      });
    }

    // topic-flavoured line
    if (topics.indexOf('privacy') !== -1 && lines.length < 6) {
      lines.push('<b>Privacy</b> &middot; EDPB adopted fresh guidance on automated decision-making — six pages, one new test.');
    }
    if (topics.indexOf('ai') !== -1 && lines.length < 6) {
      lines.push('<b>AI</b> &middot; Two consultations open in ' + escapeHTML(primaryJurShort) + ' — Frontier Safety and foundation-model transparency. Both close within 14 days.');
    }
    if (topics.indexOf('cyber') !== -1 && lines.length < 6) {
      lines.push('<b>Cyber</b> &middot; NIS2 transposition deadline missed by three member states. Notifications expected this week.');
    }

    // close with a personal nudge
    var cadenceLabel = p.cadence ? ((CADENCE.filter(function(c){return c.k===p.cadence;})[0] || {}).time || '') : '';
    if (cadenceLabel && cadenceLabel !== 'No daily') {
      lines.push('You\'ll get this as an email tomorrow at <b>' + escapeHTML(cadenceLabel) + '</b>. Change any time in Settings.');
    } else if (cadenceLabel === 'No daily') {
      lines.push('No daily email — we\'ll only nudge you when a Watchlist item moves.');
    }

    // cap at 7
    return lines.slice(0, 7);
  }

  // ================== Screen bindings ==================
  function bindCurrentScreen(){
    var name = STEPS[stepIdx];
    if (name === 'role') bindRole();
    else if (name === 'jurisdictions') bindJurisdictions();
    else if (name === 'topics') bindTopics();
    else if (name === 'cadence') bindCadence();
  }

  function bindRole(){
    document.querySelectorAll('#paiRoleList .pst-role-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        picks.role = btn.getAttribute('data-role');
        renderBriefCard();
        document.querySelectorAll('#paiRoleList .pst-role-btn').forEach(function(b){ b.classList.remove('on'); });
        btn.classList.add('on');
        updateFoot();
      });
    });
  }

  function bindJurisdictions(){
    renderJurChips();
    var host = document.getElementById('paiJurChips');
    if (host) host.addEventListener('click', function(e){
      var b = e.target.closest('.pst-chip');
      if (!b) return;
      var j = b.getAttribute('data-jur');
      var idx = picks.jurisdictions.indexOf(j);
      if (idx === -1) picks.jurisdictions.push(j); else picks.jurisdictions.splice(idx,1);
      renderJurChips(); renderBriefCard(); updateFoot();
    });
    var input = document.getElementById('paiJurSearch');
    var results = document.getElementById('paiJurResults');
    function allNames(){ return (typeof jurData !== 'undefined') ? Object.keys(jurData) : POPULAR_JURS.slice(); }
    if (input && results) {
      input.addEventListener('input', function(){
        var q = (input.value||'').trim().toLowerCase();
        if (!q) { results.classList.remove('show'); results.innerHTML=''; return; }
        var names = allNames().filter(function(n){ return n.toLowerCase().indexOf(q) !== -1; }).slice(0, 12);
        if (!names.length) { results.classList.remove('show'); results.innerHTML=''; return; }
        results.innerHTML = names.map(function(n){
          var region = (typeof jurData!=='undefined' && jurData[n]) ? jurData[n].region : '';
          return '<div class="pst-jur-row" data-name="'+escapeHTML(n)+'">' +
            '<span>'+escapeHTML(n)+'</span>' +
            (region?'<span class="pst-jur-row-region">'+escapeHTML(region)+'</span>':'') +
          '</div>';
        }).join('');
        results.classList.add('show');
      });
      results.addEventListener('click', function(e){
        var row = e.target.closest('.pst-jur-row');
        if (!row) return;
        var name = row.getAttribute('data-name');
        if (picks.jurisdictions.indexOf(name) === -1) picks.jurisdictions.push(name);
        input.value = ''; results.classList.remove('show'); results.innerHTML='';
        renderJurChips(); renderBriefCard(); updateFoot();
      });
    }
  }

  function bindTopics(){
    document.querySelectorAll('#paiTopChips .pst-chip').forEach(function(btn){
      btn.addEventListener('click', function(){
        var t = btn.getAttribute('data-top');
        var idx = picks.topics.indexOf(t);
        if (idx === -1) picks.topics.push(t); else picks.topics.splice(idx, 1);
        btn.classList.toggle('on');
        var c = document.getElementById('paiTopCount'); if (c) c.textContent = picks.topics.length + ' selected';
        renderBriefCard(); updateFoot();
      });
    });
  }

  function bindCadence(){
    document.querySelectorAll('#paiCadenceList .pst-cadence-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        picks.cadence = btn.getAttribute('data-cad');
        document.querySelectorAll('#paiCadenceList .pst-cadence-btn').forEach(function(b){ b.classList.remove('on'); });
        btn.classList.add('on');
        renderBriefCard(); updateFoot();
      });
    });
  }

  // ================== Foot buttons ==================
  function canAdvance(){
    var name = STEPS[stepIdx];
    if (name === 'welcome') return true;
    if (name === 'role') return !!picks.role;
    if (name === 'jurisdictions') return picks.jurisdictions.length > 0;
    if (name === 'topics') return picks.topics.length > 0;
    if (name === 'cadence') return !!picks.cadence;
    if (name === 'briefing') return true; // enabled by streamBriefingLines when done
    return false;
  }
  function updateFoot(){
    if (!nextBtn || !backBtn) return;
    var name = STEPS[stepIdx];
    backBtn.disabled = (stepIdx === 0);
    backBtn.style.visibility = (stepIdx === 0) ? 'hidden' : 'visible';
    if (name === 'welcome') {
      nextBtn.innerHTML = 'Begin <kbd>↵</kbd>';
      nextBtn.disabled = false;
    } else if (name === 'briefing') {
      nextBtn.innerHTML = 'Enter your dashboard <kbd>↵</kbd>';
      nextBtn.disabled = true; // becomes enabled after streaming completes
    } else if (name === 'cadence') {
      nextBtn.innerHTML = 'See my first briefing <kbd>↵</kbd>';
      nextBtn.disabled = !canAdvance();
    } else {
      nextBtn.innerHTML = 'Continue <kbd>↵</kbd>';
      nextBtn.disabled = !canAdvance();
    }
  }

  function advance(){
    if (!canAdvance()) return;
    if (stepIdx === STEPS.length - 1) {
      // finishing briefing → close stepper, land on dashboard
      closeStepper();
      applyPersonalisation();
      // offer tour as the next nudge
      setTimeout(refreshHelperCard, 400);
      return;
    }
    stepIdx += 1;
    renderStep();
  }
  function retreat(){
    if (stepIdx === 0) return;
    stepIdx -= 1;
    renderStep();
  }

  // ================== Personalisation (home only) ==================
  function shortJurs(list){
    if (!list || !list.length) return '';
    var map = { 'United Kingdom':'UK','European Union':'EU','United States':'US' };
    var mapped = list.map(function(j){ return map[j] || j; });
    if (mapped.length <= 2) return mapped.join(' · ');
    return mapped.slice(0,2).join(' · ') + ' +' + (mapped.length-2);
  }
  function shortTopics(list){
    if (!list || !list.length) return '';
    if (list.length === 1) return list[0].toLowerCase();
    if (list.length === 2) return list.join(' & ').toLowerCase();
    return list.slice(0,2).join(', ').toLowerCase() + ' +' + (list.length-2);
  }
  function applyPersonalisation(){
    if (!isHome) return;
    var onb = getOnb();
    var briefChip = document.getElementById('paiOnbBriefChip');
    var eyebrow = document.getElementById('briefEyebrow');
    var greet = document.getElementById('greetLine');
    var sub = document.querySelector('.page-head .page-sub');
    var stats = document.querySelector('.daily-stats');

    if (picksComplete(onb)) {
      if (eyebrow) {
        var baseDate = eyebrow.textContent.split(' · ')[0];
        var parts = [baseDate];
        if (onb.jurisdictions.length) parts.push(shortJurs(onb.jurisdictions).toUpperCase());
        if (onb.topics.length) parts.push(shortTopics(onb.topics).toUpperCase());
        eyebrow.textContent = parts.join(' · ');
      }
      if (greet) {
        var alertCount = Math.min(32, 3 + (onb.jurisdictions.length*2) + onb.topics.length*2);
        greet.textContent = 'Today\'s briefing — ' + alertCount + ' updates in your space.';
      }
      if (sub) {
        sub.textContent = 'Scoped to ' + shortJurs(onb.jurisdictions) + ' · ' + shortTopics(onb.topics) + '.';
      }
      if (stats) {
        var primaryJur = onb.jurisdictions[0] || 'your jurisdictions';
        stats.innerHTML =
          '<span><b style="color:#0a1729;">3 items</b> on your watchlist need attention</span>' +
          '<span style="color:#c8d0dc;">·</span>' +
          '<span><b style="color:#0a1729;">4 consultations</b> closing in '+escapeHTML(primaryJur)+'</span>' +
          '<span style="color:#c8d0dc;">·</span>' +
          '<span><b style="color:#0a1729;" id="jsEnf">—</b> enforcement captured</span>';
      }
      if (briefChip) {
        briefChip.classList.add('show');
        var picksLabel = shortJurs(onb.jurisdictions) + ' · ' + shortTopics(onb.topics) + ' · ' + roleLabelFor(onb.role);
        briefChip.innerHTML = 'Your brief: <b>'+escapeHTML(picksLabel)+'</b> &nbsp;·&nbsp; <a data-pai-edit-brief>edit</a>';
      }
    } else if (onb && onb.skipped) {
      if (briefChip) {
        briefChip.classList.add('show');
        briefChip.innerHTML = 'Showing the full world brief. <a data-pai-edit-brief>Narrow it to your remit →</a>';
      }
    }
  }
  function roleLabelFor(k){ var r = ROLES.filter(function(x){return x.k===k;})[0]; return r ? r.l.toLowerCase() : ''; }

  function mountHomeHooks(){
    if (!isHome) return;
    var head = document.querySelector('.page-head');
    if (!head) return;
    if (!document.getElementById('paiOnbBriefChip')) {
      var chip = document.createElement('div');
      chip.className = 'pai-onb-brief-chip';
      chip.id = 'paiOnbBriefChip';
      var stats = document.querySelector('.daily-stats');
      if (stats) stats.parentNode.insertBefore(chip, stats);
    }
  }

  // ================== Tour ==================
  var tourState = { active:false, stepIdx:0 };
  function visibleStopIdx(idx){
    for (var i = idx; i < TOUR_STOPS.length; i++) {
      if (findStopTarget(TOUR_STOPS[i])) return i;
    }
    return -1;
  }
  function findStopTarget(stop){ return stop.selector ? document.querySelector(stop.selector) : null; }
  function startTour(){
    if (!isHome) { location.href = 'pai-home-private.html#take-tour'; return; }
    tourState.active = true;
    var t = getTour();
    var idx = visibleStopIdx(t.step || 0);
    if (idx === -1) { endTour(true); return; }
    tourState.stepIdx = idx;
    showStep();
  }
  function showStep(){
    var stop = TOUR_STOPS[tourState.stepIdx];
    var target = findStopTarget(stop);
    if (!target) { nextStep(); return; }
    var rect = target.getBoundingClientRect();
    var ringEl = document.getElementById('paiOnbSpotRing');
    var maskEl = document.getElementById('paiOnbSpotMask');
    var tipEl = document.getElementById('paiOnbTip');
    maskEl.classList.add('show');
    ringEl.classList.add('show');
    ringEl.style.top = (rect.top - 4) + 'px';
    ringEl.style.left = (rect.left - 4) + 'px';
    ringEl.style.width = (rect.width + 8) + 'px';
    ringEl.style.height = (rect.height + 8) + 'px';
    document.getElementById('paiOnbTipStep').textContent = 'STOP ' + (tourState.stepIdx+1) + ' OF ' + TOUR_STOPS.length;
    document.getElementById('paiOnbTipTitle').textContent = stop.title;
    document.getElementById('paiOnbTipBody').textContent = stop.body;
    document.getElementById('paiOnbTipBack').style.visibility = tourState.stepIdx === 0 ? 'hidden' : 'visible';
    document.getElementById('paiOnbTipNext').textContent = (tourState.stepIdx === TOUR_STOPS.length-1) ? 'Finish' : 'Next';
    tipEl.classList.add('show');
    var tipRect = tipEl.getBoundingClientRect();
    var margin = 12;
    var top, left;
    if (stop.placement === 'right') {
      top = rect.top; left = rect.right + margin;
      if (left + tipRect.width > window.innerWidth - 12) left = rect.left + margin;
    } else {
      top = rect.bottom + margin; left = rect.left;
    }
    top = Math.max(12, Math.min(top, window.innerHeight - tipRect.height - 12));
    left = Math.max(12, Math.min(left, window.innerWidth - tipRect.width - 12));
    tipEl.style.top = top + 'px';
    tipEl.style.left = left + 'px';
    var helper = document.getElementById('paiOnbHelper'); if (helper) helper.classList.remove('show');
  }
  function nextStep(){
    var next = tourState.stepIdx + 1;
    if (next >= TOUR_STOPS.length) { endTour(true); return; }
    var idx = visibleStopIdx(next);
    if (idx === -1) { endTour(true); return; }
    tourState.stepIdx = idx;
    var t = getTour(); t.step = idx; setTour(t);
    showStep();
  }
  function backStep(){
    if (tourState.stepIdx === 0) return;
    tourState.stepIdx -= 1;
    var t = getTour(); t.step = tourState.stepIdx; setTour(t);
    showStep();
  }
  function endTour(completed){
    tourState.active = false;
    ['paiOnbSpotRing','paiOnbSpotMask','paiOnbTip'].forEach(function(id){ var el = document.getElementById(id); if (el) el.classList.remove('show'); });
    var t = getTour(); t.completed = !!completed; t.step = 0; setTour(t);
    refreshHelperCard();
  }

  // ================== Helper card ==================
  function refreshHelperCard(){
    var helper = document.getElementById('paiOnbHelper');
    if (!helper) return;
    var onb = getOnb();
    var tour = getTour();
    if (stepperOpen) { helper.classList.remove('show'); return; }
    if (tourState.active) { helper.classList.remove('show'); return; }
    if (tour.completed || tour.dismissed) { helper.classList.remove('show'); return; }
    if (!onb) { helper.classList.remove('show'); return; }
    var title = document.getElementById('paiOnbHelperTitle');
    var body = document.getElementById('paiOnbHelperBody');
    var cta = document.getElementById('paiOnbHelperCta');
    var progress = document.getElementById('paiOnbHelperProgress');
    if (isHome) {
      title.textContent = '👋 New here?';
      body.textContent = 'A colleague\'s walk-through — five stops, a minute tops.';
      cta.textContent = tour.step > 0 ? 'Resume tour →' : 'Take the tour →';
      progress.textContent = tour.step > 0 ? ('STOP ' + (tour.step+1) + ' / ' + TOUR_STOPS.length) : '';
    } else {
      title.textContent = '👋 First look around?';
      body.textContent = 'The tour lives on your home dashboard — it\'ll make sense of what each surface is for.';
      cta.textContent = 'Go to tour →';
      progress.textContent = '';
    }
    helper.classList.add('show');
  }

  // ================== Keyboard handling ==================
  function handleKey(e){
    if (!stepperOpen) return;
    // Don't hijack typing inside search input
    var inInput = e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA');
    var name = STEPS[stepIdx];

    if (e.key === 'Escape') {
      if (name === 'briefing') { advance(); return; } // Esc on briefing = enter dashboard
      skipOnboarding();
      return;
    }
    if (e.key === 'Enter' && !inInput) { e.preventDefault(); advance(); return; }
    if (e.key === 'Backspace' && !inInput && stepIdx > 0 && name !== 'briefing') { e.preventDefault(); retreat(); return; }

    // Numeric shortcuts
    if (!inInput) {
      if (name === 'role' && /^[1-6]$/.test(e.key)) {
        e.preventDefault();
        var i = parseInt(e.key, 10) - 1;
        var btn = document.querySelector('#paiRoleList .pst-role-btn[data-idx="'+i+'"]');
        if (btn) btn.click();
      }
      if (name === 'cadence' && /^[1-4]$/.test(e.key)) {
        e.preventDefault();
        var i2 = parseInt(e.key, 10) - 1;
        var btn2 = document.querySelector('#paiCadenceList .pst-cadence-btn[data-idx="'+i2+'"]');
        if (btn2) btn2.click();
      }
    }
  }

  function skipOnboarding(){
    var cur = getOnb() || {};
    cur.v = 2;
    cur.skipped = true;
    cur.skippedAt = new Date().toISOString();
    cur.role = picks.role || cur.role || null;
    cur.jurisdictions = picks.jurisdictions.length ? picks.jurisdictions : (cur.jurisdictions || []);
    cur.topics = picks.topics.length ? picks.topics : (cur.topics || []);
    cur.cadence = picks.cadence || cur.cadence || null;
    setOnb(cur);
    closeStepper();
    applyPersonalisation();
    setTimeout(refreshHelperCard, 400);
  }

  // ================== Boot ==================
  function boot(){
    takeover = document.getElementById('paiStepTakeover');
    stage = document.getElementById('paiStepStage');
    crumbs = document.getElementById('paiStepCrumbs');
    backBtn = document.getElementById('paiStepBack');
    nextBtn = document.getElementById('paiStepNext');
    exitBtn = document.getElementById('paiStepExit');
    briefCard = document.getElementById('paiStepBriefCard');

    if (nextBtn) nextBtn.addEventListener('click', advance);
    if (backBtn) backBtn.addEventListener('click', retreat);
    if (exitBtn) exitBtn.addEventListener('click', skipOnboarding);

    // Helper card + tour wiring
    var helperClose = document.getElementById('paiOnbHelperClose');
    if (helperClose) helperClose.addEventListener('click', function(){ var t = getTour(); t.dismissed = true; setTour(t); refreshHelperCard(); });
    var helperCta = document.getElementById('paiOnbHelperCta');
    if (helperCta) helperCta.addEventListener('click', startTour);
    var tipNext = document.getElementById('paiOnbTipNext');
    var tipBack = document.getElementById('paiOnbTipBack');
    var tipSkip = document.getElementById('paiOnbTipSkip');
    if (tipNext) tipNext.addEventListener('click', function(){
      if (tourState.stepIdx === TOUR_STOPS.length-1) endTour(true); else nextStep();
    });
    if (tipBack) tipBack.addEventListener('click', backStep);
    if (tipSkip) tipSkip.addEventListener('click', function(){ endTour(false); var t = getTour(); t.dismissed = true; setTour(t); refreshHelperCard(); });

    // Global edit-brief click delegation
    document.addEventListener('click', function(e){
      var t = e.target.closest('[data-pai-edit-brief]');
      if (t) { e.preventDefault(); openStepper(getOnb(), STEPS.indexOf('role')); }
    });

    document.addEventListener('keydown', function(e){
      handleKey(e);
      if (e.key === 'Escape' && tourState.active) endTour(false);
    });
    window.addEventListener('resize', function(){ if (tourState.active) showStep(); });
    window.addEventListener('scroll', function(){ if (tourState.active) showStep(); }, true);

    tagTourAnchors();
    mountHomeHooks();
    applyPersonalisation();
    saveJSON(VISIT_KEY, new Date().toISOString());

    var onb = getOnb();
    // First visit anywhere in the app: open the stepper (welcome → questions → briefing) on home only.
    if (!onb && isHome) {
      setTimeout(function(){ openStepper(null, 0); }, 150);
    }
    // Deep-link: /#take-tour (restart tour)
    if (isHome && location.hash === '#take-tour') {
      history.replaceState(null, '', location.pathname + location.search);
      setTimeout(function(){ var t = getTour(); t.dismissed = false; t.completed = false; t.step = 0; setTour(t); startTour(); }, 250);
    }
    // Deep-link: /#edit-brief (re-open stepper at role screen)
    if (isHome && location.hash === '#edit-brief') {
      history.replaceState(null, '', location.pathname + location.search);
      setTimeout(function(){ openStepper(getOnb(), STEPS.indexOf('role')); }, 200);
    }

    refreshHelperCard();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();

  // Settings-page hooks
  window.paiOpenBrief = function(){ openStepper(getOnb(), STEPS.indexOf('role')); };
  window.paiStartTour = function(){ var t = getTour(); t.dismissed = false; t.completed = false; t.step = 0; setTour(t); startTour(); };
})();
</script>
