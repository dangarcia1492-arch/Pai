<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · PrinciplesAI</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,ital,wght@8..60,0,400..700;8..60,1,400..700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Source Sans 3',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  background:#0d6b60;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}

/* Gradient background */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 30% 20%, #0e8a7d 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, #0a5549 0%, transparent 50%),
    linear-gradient(160deg, #0f7a6e 0%, #0a4f46 50%, #083d36 100%);
  z-index:0;
}

/* Large watermark P */
.watermark{
  position:fixed;
  bottom:-60px;right:-40px;
  font-family:'Source Serif 4',Georgia,serif;
  font-style:italic;
  font-size:420px;
  font-weight:700;
  color:rgba(255,255,255,.06);
  line-height:1;
  pointer-events:none;
  user-select:none;
  z-index:1;
  letter-spacing:-20px;
}

/* Subtle cycling text — bottom left */
.cycling-wrap{
  position:fixed;
  bottom:40px;left:48px;
  z-index:2;
  display:flex;flex-direction:column;gap:14px;
}
.cycling-group{
  display:flex;align-items:baseline;gap:10px;
}
.cycling-label{
  font-size:11px;font-weight:700;letter-spacing:.08em;
  color:rgba(255,255,255,.35);
  text-transform:uppercase;
  flex-shrink:0;
  min-width:90px;
}
.cycling-value{
  font-family:'Source Serif 4',serif;
  font-style:italic;
  font-size:14px;
  color:rgba(255,255,255,.55);
  height:20px;
  line-height:20px;
  position:relative;
  overflow:hidden;
}
.cv-item{
  position:absolute;top:0;left:0;
  white-space:nowrap;
  opacity:0;
  transition:opacity .5s ease;
  pointer-events:none;
  line-height:20px;
}
.cv-item.visible{
  opacity:1;
}

/* Card */
.card{
  position:relative;z-index:3;
  background:#fff;
  width:360px;
  padding:48px 44px 40px;
  border-radius:2px;
  box-shadow:0 24px 80px rgba(0,0,0,.28),0 4px 16px rgba(0,0,0,.12);
}

/* Logo */
.logo{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:28px;
}
.logo-mark{
  width:56px;height:56px;
  background:#0e8a7d;
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;
  box-shadow:0 4px 16px rgba(14,138,125,.35);
}
.logo-mark span{
  font-family:'Source Serif 4',serif;
  font-style:italic;
  font-weight:700;
  font-size:26px;
  color:#fff;
  letter-spacing:-1px;
}
.logo-name{
  font-family:'Source Serif 4',serif;
  font-size:22px;
  font-weight:400;
  color:#0f172a;
  letter-spacing:-.5px;
}
.logo-name em{
  font-style:italic;
  color:#0e8a7d;
  font-weight:600;
}
.logo-sub{
  font-size:13px;
  color:#6c7686;
  margin-top:4px;
}

/* Form */
.field{
  margin-bottom:14px;
}
.field input{
  width:100%;
  height:44px;
  padding:0 14px;
  border:1px solid #d5d8dd;
  border-radius:2px;
  font-family:inherit;
  font-size:14px;
  color:#0f172a;
  background:#fff;
  outline:none;
  transition:border-color .15s;
}
.field input::placeholder{color:#98a0ad}
.field input:focus{border-color:#0e8a7d;box-shadow:0 0 0 3px rgba(14,138,125,.1)}

.btn-signin{
  width:100%;height:44px;
  background:#0e8a7d;
  color:#fff;
  border:none;
  border-radius:2px;
  font-family:inherit;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:.01em;
  margin-top:8px;
  transition:background .15s;
}
.btn-signin:hover{background:#0a6b61}

.forgot{
  display:block;
  text-align:center;
  margin-top:20px;
  font-size:13px;
  color:#6c7686;
  text-decoration:none;
  cursor:pointer;
  transition:color .15s;
}
.forgot:hover{color:#0e8a7d}
</style>
</head>
<body>

<div class="watermark">P</div>

<!-- Cycling text bottom-left -->
<div class="cycling-wrap">
  <div class="cycling-group">
    <span class="cycling-label">Authority</span>
    <span class="cycling-value"><span class="cv-item visible" id="cyc-auth">EU AI Office</span></span>
  </div>
  <div class="cycling-group">
    <span class="cycling-label">Development</span>
    <span class="cycling-value"><span class="cv-item visible" id="cyc-dev">AI Act implementation</span></span>
  </div>
  <div class="cycling-group">
    <span class="cycling-label">Jurisdiction</span>
    <span class="cycling-value"><span class="cv-item visible" id="cyc-jur">European Union</span></span>
  </div>
</div>

<!-- Login card -->
<div class="card">
  <div class="logo">
    <div class="logo-mark"><span>P</span></div>
    <div class="logo-name">Principles<em>AI</em></div>
    <div class="logo-sub">Sign in to your workspace</div>
  </div>

  <form onsubmit="handleSignIn(event)">
    <div class="field">
      <input type="email" id="inp-email" placeholder="Email address" autocomplete="email">
    </div>
    <div class="field">
      <input type="password" id="inp-pass" placeholder="Password" autocomplete="current-password">
    </div>
    <button class="btn-signin" type="submit" id="btn-submit">Sign In</button>
  </form>

  <a class="forgot" href="#">Forgot password?</a>
  <a class="forgot" href="index.html" style="margin-top:8px;font-size:.72rem;opacity:.45">View demo →</a>
</div>

<script>
function handleSignIn(e) {
  e.preventDefault();
  var btn = document.getElementById('btn-submit');
  btn.textContent = 'Signing in…';
  btn.disabled = true;
  setTimeout(function() { window.location.href = 'index.html'; }, 600);
}

var triplets = [
  ['EU AI Office',    'AI Act implementation', 'European Union'],
  ['ICO (UK)',        'Enforcement actions',   'United Kingdom'],
  ['CNIL (France)',   'Guidance & opinions',   'France'],
  ['FTC (US)',        'Bills in progress',     'United States'],
  ['Garante (Italy)', 'Case law',              'Italy'],
  ['BfDI (Germany)',  'Consultations',         'Germany'],
  ['PIPC (Korea)',    'Enforcement actions',   'South Korea'],
  ['PDPC (Singapore)','AI governance',         'Singapore'],
];
var idx = 0;
var auth = document.getElementById('cyc-auth');
var dev  = document.getElementById('cyc-dev');
var jur  = document.getElementById('cyc-jur');
function cycleAll() {
  auth.classList.remove('visible');
  dev.classList.remove('visible');
  jur.classList.remove('visible');
  setTimeout(function() {
    idx = (idx + 1) % triplets.length;
    auth.textContent = triplets[idx][0];
    dev.textContent  = triplets[idx][1];
    jur.textContent  = triplets[idx][2];
    auth.classList.add('visible');
    dev.classList.add('visible');
    jur.classList.add('visible');
  }, 350);
  setTimeout(cycleAll, 3000);
}
setTimeout(cycleAll, 3000);
</script>
</body>
</html>
