<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · PrinciplesAI</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:opsz,ital,wght@8..60,0,400..700;8..60,1,400..700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Source Sans 3',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  background:#0d6b60;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}

/* Gradient background */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 30% 20%, #0e8a7d 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, #0a5549 0%, transparent 50%),
    linear-gradient(160deg, #0f7a6e 0%, #0a4f46 50%, #083d36 100%);
  z-index:0;
}

/* Large watermark P */
.watermark{
  position:fixed;
  bottom:-60px;right:-40px;
  font-family:'Source Serif 4',Georgia,serif;
  font-style:italic;
  font-size:420px;
  font-weight:700;
  color:rgba(255,255,255,.06);
  line-height:1;
  pointer-events:none;
  user-select:none;
  z-index:1;
  letter-spacing:-20px;
}

/* Card */
.card{
  position:relative;z-index:3;
  background:#fff;
  width:420px;
  max-width:calc(100vw - 40px);
  padding:56px 52px 44px;
  border-radius:3px;
  box-shadow:0 28px 90px rgba(0,0,0,.30),0 6px 20px rgba(0,0,0,.12);
}

/* Logo */
.logo{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:36px;
}
.logo-mark{
  width:64px;height:64px;
  background:#0e8a7d;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:18px;
  box-shadow:0 6px 20px rgba(14,138,125,.35);
}
.logo-mark span{
  font-family:'Source Serif 4',serif;
  font-style:italic;
  font-weight:700;
  font-size:30px;
  color:#fff;
  letter-spacing:-1px;
}
.logo-name{
  font-family:'Source Serif 4',serif;
  font-size:26px;
  font-weight:400;
  color:#0f172a;
  letter-spacing:-.5px;
}
.logo-name em{
  font-style:italic;
  color:#0e8a7d;
  font-weight:600;
}
.logo-sub{
  font-size:14px;
  color:#6c7686;
  margin-top:6px;
}

/* Form */
.field{
  margin-bottom:16px;
}
.field input{
  width:100%;
  height:48px;
  padding:0 16px;
  border:1px solid #d5d8dd;
  border-radius:3px;
  font-family:inherit;
  font-size:15px;
  color:#0f172a;
  background:#fff;
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.field input::placeholder{color:#98a0ad}
.field input:focus{border-color:#0e8a7d;box-shadow:0 0 0 3px rgba(14,138,125,.12)}

.btn-signin{
  width:100%;height:48px;
  background:#0e8a7d;
  color:#fff;
  border:none;
  border-radius:3px;
  font-family:inherit;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:.01em;
  margin-top:12px;
  transition:background .15s;
}
.btn-signin:hover{background:#0a6b61}

.forgot{
  display:block;
  text-align:center;
  margin-top:24px;
  font-size:13px;
  color:#6c7686;
  text-decoration:none;
  cursor:pointer;
  transition:color .15s;
}
.forgot:hover{color:#0e8a7d}
.demo-link{
  display:block;text-align:center;margin-top:10px;
  font-size:12px;color:#98a0ad;text-decoration:none;opacity:.7;
}
.demo-link:hover{color:#0e8a7d;opacity:1}
</style>
<link rel="stylesheet" href="mobile-overrides.css?v=20260430">
</head>
<body>

<div class="watermark">P</div>

<!-- Login card -->
<div class="card">
  <div class="logo">
    <div class="logo-mark"><span>P</span></div>
    <div class="logo-name">Principles<em>AI</em></div>
    <div class="logo-sub">Sign in to your workspace</div>
  </div>

  <form onsubmit="handleSignIn(event)">
    <div class="field">
      <input type="email" id="inp-email" placeholder="Email address" autocomplete="email">
    </div>
    <div class="field">
      <input type="password" id="inp-pass" placeholder="Password" autocomplete="current-password">
    </div>
    <button class="btn-signin" type="submit" id="btn-submit">Sign In</button>
  </form>

  <a class="forgot" href="#">Forgot password?</a>
  <a class="demo-link" href="index.html">View demo &rarr;</a>
</div>

<script>
function handleSignIn(e) {
  e.preventDefault();
  var btn = document.getElementById('btn-submit');
  btn.textContent = 'Signing in…';
  btn.disabled = true;
  setTimeout(function() { window.location.href = 'index.html'; }, 600);
}
</script>
</body>
</html>
